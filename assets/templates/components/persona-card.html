<!-- persona-card.html — User persona panel fragment -->
<div class="uxrt-persona-card">
  <div class="uxrt-persona-card__avatar">
    <span contenteditable="true" data-field="persona.avatar_emoji">__PERSONA_AVATAR__</span>
  </div>
  <div class="uxrt-persona-card__body">
    <div class="uxrt-persona-card__name"
         contenteditable="true"
         data-field="persona.name">__PERSONA_NAME__</div>
    <div class="uxrt-persona-card__meta">
      <span contenteditable="true" data-field="persona.age">__PERSONA_AGE__</span> años
      · <span contenteditable="true" data-field="persona.role">__PERSONA_ROLE__</span>
      · <span contenteditable="true" data-field="persona.location">__PERSONA_LOCATION__</span>
    </div>
    <div class="uxrt-persona-card__pain">
      <strong>Dolor principal:</strong>
      <span contenteditable="true" data-field="persona.primary_pain">__PERSONA_PRIMARY_PAIN__</span>
    </div>
    <div class="uxrt-persona-card__context" style="font-size:13px;color:#999;margin-top:6px;line-height:1.5;">
      <span contenteditable="true" data-field="persona.context">__PERSONA_CONTEXT__</span>
    </div>
  </div>
</div>
