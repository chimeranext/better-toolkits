<section id="blooms-progression">
  <h2>Bloom's Progression</h2>
  <p>Builder's Bloom's level por módulo. Idealmente la curva sube monotónicamente
     desde Recognize (1) hasta Ship (6).</p>

  <div class="svg-container">
    <svg viewBox="0 0 800 300" width="100%" height="300" xmlns="http://www.w3.org/2000/svg" style="font: 11px sans-serif; color: #e6e6e6;">
      <!-- Grid lines -->
      <g stroke="#2d3a4f" stroke-width="0.5">
        <!-- Y axis levels (1-6) -->
        <!-- {{Y_AXIS_LINES}} -->
      </g>

      <!-- Y axis labels -->
      <g fill="#8a99ad">
        <text x="10" y="40">6 Ship</text>
        <text x="10" y="80">5 Decide</text>
        <text x="10" y="120">4 Debug</text>
        <text x="10" y="160">3 Build</text>
        <text x="10" y="200">2 Explain</text>
        <text x="10" y="240">1 Recognize</text>
      </g>

      <!-- Bloom's curve polyline -->
      <!-- {{BLOOMS_POLYLINE}} -->

      <!-- Module dots + labels -->
      <!-- {{MODULE_DOTS}} -->
    </svg>
  </div>

  <div class="legend">
    <span style="color:#94a3b8">Recognize</span>
    <span style="color:#60a5fa">Explain</span>
    <span style="color:#4ade80">Build</span>
    <span style="color:#fbbf24">Debug</span>
    <span style="color:#c084fc">Decide</span>
    <span style="color:#7dd3fc">Ship</span>
  </div>
</section>
