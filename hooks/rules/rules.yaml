- id: block-sibling-suffix-storage
  description: Block storage uploads that use a sibling-suffix layout (memory feedback_explicit_storage_prefixes.md — use originals/ + processed/ subdirs instead)
  applies_to: [Bash]
  match:
    # CLI surface only — `supabase storage upload`, `gcloud storage cp`,
    # `gsutil cp`. The application-layer storage-uploader code paths are
    # covered by review; this rule is a defense-in-depth guard against
    # ad-hoc CLI uploads with the discouraged layout. Match common
    # transformation suffixes (`processed`, `original`, `raw`, `optimized`)
    # paired with common artefact extensions.
    - field: command
      pattern: '(supabase[[:space:]]+storage[[:space:]]+upload|gcloud[[:space:]]+storage[[:space:]]+cp|gsutil[[:space:]]+cp).*\.(processed|original|raw|optimized)\.(zip|tar|gz|bin|jpg|jpeg|png|pdf|mp4)\b'
      flags: i
  action: block
  bypass_marker: sibling-suffix-storage-allowed
  memory_ref: feedback_explicit_storage_prefixes.md
  message: |
    BLOCKED: storage upload with a sibling-suffix layout.

    Per feedback_explicit_storage_prefixes.md pipelines that transform
    artefacts must use <bucket>/originals/ + <bucket>/processed/
    (or stage-specific names), never siblings like foo.zip +
    foo.processed.zip in the same folder.

    Use:
      <bucket>/originals/foo.zip
      <bucket>/processed/foo.zip

    Bypass marker (sibling-suffix-storage-allowed) ONLY for legacy
    buckets in active migration.
  tests:
    - name: blocks-supabase-storage-processed-suffix
      input:
        tool_input:
          command: 'supabase storage upload my-bucket/foo.processed.zip ./foo.processed.zip'
      expected_exit: 2
    - name: blocks-gcloud-storage-cp
      input:
        tool_input:
          command: 'gcloud storage cp ./foo.processed.zip gs://my-bucket/foo.processed.zip'
      expected_exit: 2
    - name: blocks-gsutil-original-suffix
      input:
        tool_input:
          command: 'gsutil cp ./foo.original.mp4 gs://my-bucket/foo.original.mp4'
      expected_exit: 2
    - name: allows-clean-paths
      input:
        tool_input:
          command: 'supabase storage upload my-bucket/originals/foo.zip ./foo.zip'
      expected_exit: 0
    # Both source and destination are clean (no suffix anywhere) — must allow.
    # This locks in the negative path while the positive
    # `blocks-gcloud-storage-cp` test confirms the rule fires when a sibling-
    # suffix appears anywhere in the command.
    - name: allows-clean-source-and-clean-destination-bucket-prefix
      input:
        tool_input:
          command: 'gcloud storage cp ./foo.zip gs://my-bucket/processed/foo.zip'
      expected_exit: 0
    - name: allows-non-storage-cp
      input:
        tool_input:
          command: 'cp ./foo.processed.zip /tmp/foo.processed.zip'
      expected_exit: 0
    - name: allows-bypass-marker
      input:
        tool_input:
          command: 'gcloud storage cp ./foo.processed.zip gs://my-bucket/foo.processed.zip # hook-bypass: sibling-suffix-storage-allowed'
      expected_exit: 0

- id: warn-localhost-in-pr-body
  description: Warn when `gh pr create` / `gh pr edit` body contains a localhost reference (memory feedback_test_on_staging.md — QA target is dev.chimeranext.io, not localhost)
  applies_to: [Bash]
  match:
    # Two AND-chained conditions on `command`: the gh subcommand uses
    # --body inline AND the same command line contains localhost or
    # 127.0.0.1. The --body-file form is naturally excluded — the rule
    # cannot read the body file content, and --body-file does not contain
    # the literal "localhost" itself.
    - field: command
      pattern: 'gh[[:space:]]+pr[[:space:]]+(create|edit).*--body([[:space:]]|=|$)'
    - field: command
      pattern: '(localhost|127\.0\.0\.1)'
  action: warn
  bypass_marker: localhost-in-pr-body-allowed
  memory_ref: feedback_test_on_staging.md
  message: |
    WARNING: localhost reference in PR body.

    Per feedback_test_on_staging.md the QA testing target is
    dev.chimeranext.io (staging), not localhost. Any reviewer who tries
    to verify against localhost will hit env mismatches:
      - Local DB differs from staging
      - Edge Functions missing local secrets
      - Different feature flags

    Replace localhost links with dev.chimeranext.io equivalents.

    Bypass marker (localhost-in-pr-body-allowed) ONLY for steps that
    legitimately require an explicit local build (e.g. asking the
    reviewer to run `bun run dev` before pushing).
  tests:
    - name: warns-pr-create-with-localhost
      input:
        tool_input:
          command: 'gh pr create --base develop --title "feat: foo" --body "Test on http://localhost:5173/foo"'
      expected_exit: 0
      expected_stderr_contains: 'warn-localhost-in-pr-body'
    - name: warns-pr-edit-with-127
      input:
        tool_input:
          command: 'gh pr edit 16 --body "Hit http://127.0.0.1:54321/health"'
      expected_exit: 0
      expected_stderr_contains: 'warn-localhost-in-pr-body'
    - name: allows-pr-create-with-staging-url
      input:
        tool_input:
          command: 'gh pr create --base develop --title "feat: foo" --body "Test on https://dev.chimeranext.io/foo"'
      expected_exit: 0
    - name: allows-non-pr-localhost
      input:
        tool_input:
          command: 'curl http://localhost:5173/foo'
      expected_exit: 0
    - name: allows-pr-create-no-body
      input:
        tool_input:
          command: 'gh pr create --base develop --title "feat: foo"'
      expected_exit: 0
    - name: allows-bypass-marker
      input:
        tool_input:
          command: 'gh pr create --body "Run bun run dev on localhost:5173 # hook-bypass: localhost-in-pr-body-allowed"'
      expected_exit: 0

- id: warn-bash-mutation-without-leading-cd
  description: Warn when bash mutation commands (git commit/push/mv/rm/reset/merge/revert, sed -i / sed --in-place, gh pr create/merge/edit) don't start with an absolute-path `cd /<...>` (or `pushd /<...>`, `cd ~/<...>`, `cd $VAR/<...>`) — prevents commits landing on the wrong branch when working across multiple parallel worktrees
  applies_to: [Bash]
  match:
    # Positive: command contains a state-mutating op.
    # sed pattern covers: `sed -i `, `sed -i.bak`, `sed -ibackup`, and long form `sed --in-place`.
    - field: command
      pattern: 'git[[:space:]]+(commit|push|mv|rm[[:space:]]|reset|revert|merge)|sed[[:space:]]+-i([[:space:]]|[^[:space:]-])|sed[[:space:]]+--in-place[[:space:]]|gh[[:space:]]+pr[[:space:]]+(create|merge|edit)'
    # Negative: command must START with `cd <absolute-path>` or `pushd <absolute-path>`.
    # Accepts: cd /full/path, pushd /full/path, cd ~/path, cd $VAR/path (env vars assumed absolute).
    # Rejects: cd worktree-dir (relative path — DOESN'T fix the cwd-confusion bug because if
    # cwd is already in the wrong worktree, `cd relative-dir` resolves to the wrong place).
    - field: command
      not_pattern: '^[[:space:]]*(cd|pushd)[[:space:]]+(/|~|\$)'
  action: warn
  bypass_marker: cd-worktree-rule
  memory_ref: feedback_cd_between_worktrees.md
  references:
    - "legacy-ticket PR-2/PR-3 cross-ref fixup (2026-05-10) — bug that motivated this rule"
  message: |
    WARN: bash mutation command (git commit/push/mv/rm/reset/merge/revert,
    sed -i, or gh pr create/merge/edit) detected without a leading
    `cd /<path>` prefix.

    Per feedback_cd_between_worktrees.md: when working across multiple
    parallel git worktrees in the same session, EVERY bash invocation that
    touches a specific worktree MUST start with explicit
    `cd /full/path/to/worktree && ...`.

    Bug pattern this prevents (real, 2026-05-10):
    - Two parallel worktrees for two PRs (PR-2 + PR-3 of same repo).
    - First worktree's sed + commit + push: correct (cwd was PR-2).
    - Second worktree's sed + commit + push: missing cd → still in PR-2 cwd
      → commit landed on PR-2 branch instead of PR-3 branch.
    - Required revert on PR-2 + correct re-apply on PR-3. Confused commit
      history visible to reviewers.

    If the command operates on absolute paths or doesn't need cwd context,
    or you've intentionally verified cwd via `pwd` immediately before,
    add "# hook-bypass: cd-worktree-rule" to acknowledge.
  tests:
    - name: warns-on-git-commit-no-cd
      input:
        tool_input:
          command: 'git add foo.md && git commit -m "fix"'
      expected_exit: 0
      expected_stderr_contains: 'warn-bash-mutation-without-leading-cd'
    - name: warns-on-git-push-no-cd
      input:
        tool_input:
          command: 'git push origin main'
      expected_exit: 0
      expected_stderr_contains: 'warn-bash-mutation-without-leading-cd'
    - name: warns-on-git-mv-no-cd
      input:
        tool_input:
          command: 'git mv content/old content/new'
      expected_exit: 0
      expected_stderr_contains: 'warn-bash-mutation-without-leading-cd'
    - name: warns-on-git-rm-no-cd
      input:
        tool_input:
          command: 'git rm path/to/file.md'
      expected_exit: 0
      expected_stderr_contains: 'warn-bash-mutation-without-leading-cd'
    - name: warns-on-sed-i-no-cd
      input:
        tool_input:
          command: 'sed -i s/foo/bar/g content/file.md'
      expected_exit: 0
      expected_stderr_contains: 'warn-bash-mutation-without-leading-cd'
    - name: warns-on-sed-i-bak-no-cd
      input:
        tool_input:
          command: 'sed -i.bak s/foo/bar/g content/file.md'
      expected_exit: 0
      expected_stderr_contains: 'warn-bash-mutation-without-leading-cd'
    - name: warns-on-sed-in-place-long-form-no-cd
      input:
        tool_input:
          command: 'sed --in-place s/foo/bar/g content/file.md'
      expected_exit: 0
      expected_stderr_contains: 'warn-bash-mutation-without-leading-cd'
    - name: warns-on-git-commit-with-relative-cd
      input:
        tool_input:
          command: 'cd worktree-dir && git commit -m "fix"'
      expected_exit: 0
      expected_stderr_contains: 'warn-bash-mutation-without-leading-cd'
    - name: warns-on-git-push-with-dotdot-cd
      input:
        tool_input:
          command: 'cd ../sibling-dir && git push'
      expected_exit: 0
      expected_stderr_contains: 'warn-bash-mutation-without-leading-cd'
    - name: warns-on-gh-pr-create-no-cd
      input:
        tool_input:
          command: 'gh pr create --base main --title foo'
      expected_exit: 0
      expected_stderr_contains: 'warn-bash-mutation-without-leading-cd'
    - name: warns-on-gh-pr-merge-no-cd
      input:
        tool_input:
          command: 'gh pr merge 27 --squash --delete-branch'
      expected_exit: 0
      expected_stderr_contains: 'warn-bash-mutation-without-leading-cd'
    - name: warns-on-git-reset-hard-no-cd
      input:
        tool_input:
          command: 'git reset --hard origin/main'
      expected_exit: 0
      expected_stderr_contains: 'warn-bash-mutation-without-leading-cd'
    - name: passes-with-cd-prefix
      input:
        tool_input:
          command: 'cd /home/user/repo && git commit -m fix && git push'
      expected_exit: 0
    - name: passes-with-pushd-prefix
      input:
        tool_input:
          command: 'pushd /home/user/repo && git commit -m fix'
      expected_exit: 0
    - name: passes-with-tilde-cd-prefix
      input:
        tool_input:
          command: 'cd ~/repo && git commit -m fix'
      expected_exit: 0
    - name: passes-with-env-var-cd-prefix
      input:
        tool_input:
          command: 'cd $WORKTREE && git push'
      expected_exit: 0
    - name: passes-on-git-status
      input:
        tool_input:
          command: 'git status'
      expected_exit: 0
    - name: passes-on-git-log
      input:
        tool_input:
          command: 'git log --oneline -3'
      expected_exit: 0
    - name: passes-on-git-diff
      input:
        tool_input:
          command: 'git diff --stat'
      expected_exit: 0
    - name: passes-on-gh-pr-list
      input:
        tool_input:
          command: 'gh pr list --author=@me'
      expected_exit: 0
    - name: passes-on-gh-pr-view
      input:
        tool_input:
          command: 'gh pr view 27 --json mergeable'
      expected_exit: 0
    - name: passes-with-bypass-marker
      input:
        tool_input:
          command: 'git push origin main # hook-bypass: cd-worktree-rule'
      expected_exit: 0

- id: warn-version-readme-changelog-sync
  description: Warn when a version manifest (package.json, plugin.json, marketplace.json) is being bumped without a parallel update to README.md + CHANGELOG.md — the visible-version surface drifts silently otherwise (legacy-ticket defense-in-depth, sister rule to chimera-os repo-local post-write-version-readme-sync.sh)
  applies_to: [Edit, Write, MultiEdit]
  match:
    # Anchor on start-of-string OR a leading "/" so the rule fires for both
    # relative and absolute file paths. Covers the four manifest surfaces
    # that ship a "version" field in this repo and most plugin repos:
    #   - package.json                       (npm manifest)
    #   - plugin.json                        (Claude Code plugin manifest at repo root)
    #   - marketplace.json                   (marketplace manifest at repo root)
    #   - .claude-plugin/plugin.json         (Claude Code plugin manifest, namespaced)
    #   - .claude-plugin/marketplace.json    (marketplace manifest, namespaced)
    - field: file_path
      pattern: '(^|/)(package\.json|plugin\.json|marketplace\.json|\.claude-plugin/plugin\.json|\.claude-plugin/marketplace\.json)$'
    # Positive: the new content / new_string includes a "version": "X.Y.Z" line.
    # Quote handling: JSON manifest files always use double quotes, so the
    # pattern only needs to match the canonical `"version": "<digit>...` form.
    # `[0-9]` as the first version character is intentional — we only warn on
    # real semver-shaped bumps, not on edits that happen to remove the version
    # field or add unrelated keys.
    - field: content
      pattern: '"version"[[:space:]]*:[[:space:]]*"[0-9]'
  action: warn
  bypass_marker: version-readme-changelog-sync
  memory_ref: feedback_version_readme_changelog_sync.md
  references:
    - "legacy-ticket — three-layer drift thesis (Cure 4: PreToolUse/PostToolUse hooks)"
    - "Sister hook in chimera-os: .claude/hooks/post-write-version-readme-sync.sh"
    - "make-no-mistakes-toolkit PR #21 — visible README version + reconstructed CHANGELOG"
  message: |
    WARN: a version manifest (package.json / plugin.json / marketplace.json)
    is being written with a "version": "X.Y.Z" field, but this hook cannot
    see whether README.md and CHANGELOG.md were updated in the same change.

    When you bump the version in any manifest, also update in the same PR:
      1. README.md — the "Version: X.Y.Z" line at the top
      2. CHANGELOG.md — add a new entry under ## [X.Y.Z] - YYYY-MM-DD

    Why this rule exists (legacy-ticket three-layer drift thesis):
    - The repo shipped 1.1.0 → 1.14.0 with NO visible version anywhere a
      human would look (README, CHANGELOG, or git tags). PR #21 closed that
      gap by reconstructing the CHANGELOG and adding a header version line.
    - Without this rule, the same drift will reappear on the next bump.
    - Defense-in-depth: the chimera-os repo has a sister PostToolUse hook
      (.claude/hooks/post-write-version-readme-sync.sh) that catches the
      same drift locally even if this toolkit isn't installed.

    Suggested workflow:
      bump version in manifest(s) → update README.md "Version: ..." line →
      append CHANGELOG.md entry → commit all four files together.

    If you're intentionally splitting the bump from the README/CHANGELOG
    update (e.g., bumping a vendored sub-manifest's version that isn't user-
    visible), add "# hook-bypass: version-readme-changelog-sync" inline in
    a comment near the version field or pass it on the Write call.
  tests:
    - name: warns-on-package-json-version-bump
      input:
        tool_input:
          file_path: 'package.json'
          content: |
            {
              "name": "@example/pkg",
              "version": "1.15.0"
            }
      expected_exit: 0
      expected_stderr_contains: 'warn-version-readme-changelog-sync'
    - name: warns-on-plugin-json-version-bump
      input:
        tool_input:
          file_path: '.claude-plugin/plugin.json'
          content: |
            {
              "name": "make-no-mistakes",
              "version": "1.15.0"
            }
      expected_exit: 0
      expected_stderr_contains: 'warn-version-readme-changelog-sync'
    - name: warns-on-marketplace-json-version-bump
      input:
        tool_input:
          file_path: '.claude-plugin/marketplace.json'
          content: |
            {
              "name": "marketplace",
              "version": "1.15.0",
              "plugins": [{"version": "1.15.0"}]
            }
      expected_exit: 0
      expected_stderr_contains: 'warn-version-readme-changelog-sync'
    - name: warns-on-absolute-path-package-json
      input:
        tool_input:
          file_path: '/home/user/repo/package.json'
          content: '{"version": "2.0.0"}'
      expected_exit: 0
      expected_stderr_contains: 'warn-version-readme-changelog-sync'
    - name: warns-on-root-plugin-json
      input:
        tool_input:
          file_path: 'plugin.json'
          content: '{"version": "1.0.1"}'
      expected_exit: 0
      expected_stderr_contains: 'warn-version-readme-changelog-sync'
    - name: warns-on-edit-of-package-json
      input:
        tool_input:
          file_path: 'package.json'
          old_string: '"version": "1.14.0"'
          new_string: '"version": "1.15.0"'
      expected_exit: 0
      expected_stderr_contains: 'warn-version-readme-changelog-sync'
    - name: allows-package-json-write-without-version-field
      input:
        tool_input:
          file_path: 'package.json'
          content: |
            {
              "name": "@example/pkg",
              "description": "no version field touched"
            }
      expected_exit: 0
    - name: allows-unrelated-json-file
      input:
        tool_input:
          file_path: 'tsconfig.json'
          content: '{"version": "1.0.0"}'
      expected_exit: 0
    - name: allows-readme-write
      input:
        tool_input:
          file_path: 'README.md'
          content: '**Version: 1.15.0**'
      expected_exit: 0
    - name: allows-changelog-write
      input:
        tool_input:
          file_path: 'CHANGELOG.md'
          content: '## [1.15.0] - 2026-05-14'
      expected_exit: 0
    - name: allows-bypass-marker
      input:
        tool_input:
          file_path: 'package.json'
          content: |
            {
              "version": "1.15.0"
              // hook-bypass: version-readme-changelog-sync
            }
      expected_exit: 0

# -----------------------------------------------------------------------------
# Greptile review extraction discipline
#
# Greptile App on GitHub EDITS the same review comment in-place on each
# re-review, instead of posting a fresh comment per analysis pass. So:
#   - comment.created_at stays fixed at original creation (DOES NOT change on
#     re-review).
#   - comment.updated_at is what changes when Greptile re-analyzes.
#   - The HTML <sub>Last reviewed commit: [...](https://.../commit/HASH)</sub>
#     footer is the authoritative source for "which commit this review covers".
#
# Recurring buggy patterns Claude writes (seen in CIV-728 PR #114 forensic
# 2026-05-25 and earlier sessions — see memory feedback_greptile_match_head_
# not_chronology.md):
#   1. `gh api .../comments --jq '... | sort_by(.created_at) ...'` — uses
#      creation order, returns stale state on re-reviews.
#   2. `gh api .../comments | grep "Confidence Score" | head -1` — grabs
#      first-by-creation, not latest-by-update.
#   3. `(.body | capture("/commit/(?<sha>[0-9a-f]+)"))` — captures the FIRST
#      commit URL anywhere in the body (often a code-permalink quoted in a
#      finding, NOT the "Last reviewed commit" footer hash).
#
# The corrective pattern uses updated_at AND extracts the commit hash from
# the "Last reviewed commit:" prefix specifically:
#   gh api "repos/<o>/<r>/issues/<N>/comments" --jq '
#     [.[] | select(.user.login | test("greptile";"i")) | {
#       updated: .updated_at,
#       commit: ((.body | split("Last reviewed commit:")[1] // "" |
#                 split("commit/")[1] // "" | split(")")[0])[0:10]),
#       score: ((.body | capture("<h3>Confidence Score: (?<s>[0-9]/5)</h3>").s) // "?")
#     }] | map(select(.commit == env.SHORT)) | sort_by(.updated) | last'
#
# Memory: feedback_greptile_match_head_not_chronology.md +
#         feedback_tail_with_desc_ordering.md
# -----------------------------------------------------------------------------

- id: warn-greptile-review-extraction-by-created-at
  description: 'Warn when a Bash command extracts Greptile review state but uses created_at / chronology / first-commit-URL capture — Greptile edits the same comment in-place, so updated_at + the "Last reviewed commit:" footer hash are the authoritative signals (memory feedback_greptile_match_head_not_chronology.md)'
  applies_to: [Bash]
  match:
    # Condition A: a comments API call AND a "greptile" reference must both
    # be present in the same command line. Reading anything else from gh api
    # comments is fine; warning fires only when the consumer is looking for
    # Greptile state. The user.login filter usually appears as
    # `select(.user.login | test("greptile";"i"))` or `grep -i greptile`.
    - field: command
      pattern: 'gh[[:space:]]+api\b.*\bcomments\b'
    - field: command
      pattern: 'greptile'
      flags: i
    # Condition B: at least one of three buggy patterns is present.
    #   B1. `created_at` referenced inside jq (sort_by, select, the projection
    #       itself). On re-review Greptile leaves created_at untouched, so any
    #       use of it to find "the latest review" returns a stale snapshot.
    #   B2. A `head -N` / `tail -N` after greptile match — implicit chronology
    #       assumption ("first match is the right one") that the in-place edit
    #       behavior silently breaks.
    #   B3. A jq `capture("/commit/...sha...")` near greptile — grabs the
    #       first commit hash anywhere in the body (often a permalink quoted
    #       inside a finding), not the authoritative "Last reviewed commit:"
    #       footer hash.
    - field: command
      pattern: '(\bcreated_at\b|\b(head|tail)[[:space:]]+-n?[[:space:]]*[0-9]+|capture\([^)]*/commit/)'
    # Negative: if the command ALREADY uses updated_at or extracts via "Last
    # reviewed commit:", it is on the correct path and the warning would be
    # pure noise. Allow it through.
    - field: command
      not_pattern: '(Last reviewed commit|\bupdated_at\b)'
  action: warn
  bypass_marker: greptile-extraction-acknowledged
  memory_ref: feedback_greptile_match_head_not_chronology.md
  references:
    - 'feedback_tail_with_desc_ordering.md — sister rule on DESC|tail bug'
    - 'CIV-728 PR #114 forensic 2026-05-25 — stale 3/5 review picked over 5/5 HEAD review'
  message: |
    WARN: Bash command extracts Greptile review state with a chronology-based
    pattern (created_at / head -N / tail -N / capture(.../commit/...)).

    Greptile App on GitHub EDITS the same review comment in-place on each
    re-review. As a result:
      - comment.created_at is FROZEN at original posting; it DOES NOT
        change when Greptile re-analyzes a new commit.
      - comment.updated_at IS what moves with each re-review.
      - The "<sub>Last reviewed commit: ...(commit/HASH)</sub>" footer in
        the body is the authoritative source for "which commit this review
        is about" — NOT the first /commit/ URL captured anywhere in the
        body (which is often a permalink quoted inside a finding).

    Use this pattern instead (copy-paste-able):

      HEAD=$(gh pr view <N> --json headRefOid --jq '.headRefOid')
      export SHORT=${HEAD:0:10}
      gh api "repos/<owner>/<repo>/issues/<N>/comments" --jq '
        [.[] | select(.user.login | test("greptile";"i")) | {
          updated: .updated_at,
          commit: ((.body | split("Last reviewed commit:")[1] // "" |
                    split("commit/")[1] // "" | split(")")[0])[0:10]),
          score: ((.body | capture("<h3>Confidence Score: (?<s>[0-9]/5)</h3>").s) // "?")
        }] | map(select(.commit == env.SHORT)) | sort_by(.updated) | last'

    This:
      1. Pulls the PR's actual HEAD SHA up front.
      2. Filters Greptile comments to ONLY those whose "Last reviewed
         commit:" footer matches HEAD (so a stale older review can't win).
      3. Among the matching reviews, picks the latest by updated_at.

    Per feedback_greptile_match_head_not_chronology.md: out-of-order parallel
    re-runs make creation order misleading. Per feedback_tail_with_desc_
    ordering.md: same failure mode (trust an implicit order without
    validating it).

    Bypass marker (greptile-extraction-acknowledged) ONLY for legitimate
    cases (e.g., you explicitly WANT the creation order to audit posting
    cadence, not the latest state).
  tests:
    # B1: sort_by(.created_at) is the canonical buggy form.
    - name: warns-on-sort-by-created-at-greptile-comments
      input:
        tool_input:
          command: "gh api repos/o/r/issues/1/comments --jq '[.[] | select(.user.login | test(\"greptile\";\"i\"))] | sort_by(.created_at) | last'"
      expected_exit: 0
      expected_stderr_contains: 'warn-greptile-review-extraction-by-created-at'
    # B2a: greptile + tail -N — implicit "tail of chronological listing".
    - name: warns-on-greptile-grep-then-tail
      input:
        tool_input:
          command: "gh api repos/o/r/issues/1/comments --jq '.[].body' | grep -i greptile | tail -1"
      expected_exit: 0
      expected_stderr_contains: 'warn-greptile-review-extraction-by-created-at'
    # B2b: greptile + head -N — implicit "first match wins".
    - name: warns-on-greptile-grep-then-head
      input:
        tool_input:
          command: "gh api repos/o/r/issues/1/comments --jq '.[] | select(.body | test(\"greptile\";\"i\"))' | grep 'Confidence Score' | head -1"
      expected_exit: 0
      expected_stderr_contains: 'warn-greptile-review-extraction-by-created-at'
    # B3: capture on /commit/<sha> grabs the first /commit/ URL in the body,
    # not the Last reviewed commit footer. Common buggy form.
    - name: warns-on-capture-commit-sha-from-greptile-body
      input:
        tool_input:
          command: 'gh api repos/o/r/issues/1/comments --jq ''[.[] | select(.user.login | test("greptile";"i")) | {commit: (.body | capture("/commit/(?<sha>[0-9a-f]+)").sha)}]'''
      expected_exit: 0
      expected_stderr_contains: 'warn-greptile-review-extraction-by-created-at'
    # Correct pattern — uses updated_at + "Last reviewed commit:" — MUST PASS.
    - name: allows-correct-pattern-updated-at-and-last-reviewed-commit
      input:
        tool_input:
          command: |
            gh api "repos/o/r/issues/1/comments" --jq '
              [.[] | select(.user.login | test("greptile";"i")) | {
                updated: .updated_at,
                commit: ((.body | split("Last reviewed commit:")[1] // "" | split("commit/")[1] // "" | split(")")[0])[0:10]),
                score: ((.body | capture("<h3>Confidence Score: (?<s>[0-9]/5)</h3>").s) // "?")
              }] | sort_by(.updated) | last'
      expected_exit: 0
    # Generic gh api comments call WITHOUT greptile — out of scope.
    - name: allows-non-greptile-comments-call
      input:
        tool_input:
          command: "gh api repos/o/r/issues/1/comments --jq '[.[] | .body] | sort_by(.created_at)'"
      expected_exit: 0
    # Greptile-aware call that uses updated_at — correct, no buggy pattern.
    - name: allows-greptile-with-updated-at-and-sort
      input:
        tool_input:
          command: "gh api repos/o/r/issues/1/comments --jq '[.[] | select(.user.login | test(\"greptile\";\"i\"))] | sort_by(.updated_at) | last'"
      expected_exit: 0
    # Non-gh-api commands that mention greptile — out of scope (e.g. listing
    # PR labels containing the word, gh search code, etc.).
    - name: allows-gh-search-greptile-not-api-comments
      input:
        tool_input:
          command: 'gh search prs --label greptile-approved'
      expected_exit: 0
    - name: allows-bypass-marker
      input:
        tool_input:
          command: "gh api repos/o/r/issues/1/comments --jq '[.[] | select(.user.login | test(\"greptile\";\"i\"))] | sort_by(.created_at) | last' # hook-bypass: greptile-extraction-acknowledged"
      expected_exit: 0
- id: inline-db-mutation-mysql
  description: Block inline mysql / mysqldump mutations (use a versioned script in scripts/ or bin/ instead)
  applies_to: [Bash]
  match:
    # Positive: three mutation vectors via the mysql CLI:
    #   1. `mysql ... -e "<SQL with mutation keyword>"` — the canonical
    #      one-liner. `-e`/`--execute` may be followed by space or `=`.
    #   2. `mysql ... < file.sql` — feeding a SQL file via stdin. We cannot
    #      read the file contents, but the discipline is the same: the
    #      one-shot redirect bypasses the versioned-scripts workflow.
    #   3. `mysqldump ... | mysql ...` — restore one-liner that overwrites
    #      target data wholesale.
    # NOTE: the spacing between `-e`/`--execute` and the SQL keyword is
    # `[[:space:]]*` (zero-or-more), NOT `[[:space:]]+` — mysql accepts the
    # short form `-e"DROP TABLE foo"` with no separator. Same logic for the
    # long form: `--execute="..."` is the documented = shape, and
    # `--execute "..."` is the documented space shape. Both must match.
    # Greptile #25 P1: original regex required `[[:space:]]+|=` and missed
    # `mysql -e"..."` and `mysql --execute="..."` shapes.
    - field: command
      pattern: '(\bmysql[[:space:]][^|<]*(-e|--execute)([[:space:]]*|=)[''"]?[[:space:]]*(UPDATE|DELETE|INSERT|REPLACE|CREATE|ALTER|DROP|GRANT|REVOKE|TRUNCATE|RENAME)\b)|(\bmysql[[:space:]][^|]*<[[:space:]]*[^[:space:]]+\.sql\b)|(\bmysqldump\b[^|]*\|[[:space:]]*mysql\b)'
      flags: i
    # Negative: do not fire when the command is itself a versioned-script
    # invocation (the script lives in git, so the discipline is satisfied).
    - field: command
      not_pattern: '^[[:space:]]*(\./scripts/|bash[[:space:]]+scripts/|\./bin/|bash[[:space:]]+bin/|sh[[:space:]]+scripts/|sh[[:space:]]+bin/)'
  action: block
  bypass_marker: db-mutation-rule
  disable_if_repo_file: .no-make-no-mistakes-db-mutation
  memory_ref: feedback_scripts_not_db.md
  message: |
    BLOCKED: inline mysql / mysqldump DB mutation detected.

    Per feedback_scripts_not_db.md: scripts-in-the-repo, not inline.
    Move the SQL into a versioned file under scripts/ or bin/ and invoke
    that script. The script wrapper makes the change reviewable in git,
    re-runnable across environments, and auditable after the fact.

    Allowed patterns:
      - SELECT / SHOW / DESCRIBE / EXPLAIN — read-only is fine inline
      - `./scripts/<name>.sh` / `bash scripts/<name>.sh` — versioned wrapper
      - `# hook-bypass: db-mutation-rule` appended to the command for an
        explicitly-acknowledged one-shot

    Per-repo escape hatch: `touch .no-make-no-mistakes-db-mutation` at the
    repo root if the entire repo's job is inline DB work.
  tests:
    - name: blocks-mysql-e-update
      input:
        tool_input:
          command: "mysql -u root -e \"UPDATE users SET active=1 WHERE id=42\""
      expected_exit: 2
    - name: blocks-mysql-e-delete
      input:
        tool_input:
          command: "mysql -u root mydb -e 'DELETE FROM sessions WHERE expired_at < NOW()'"
      expected_exit: 2
    - name: blocks-mysql-e-drop-table
      input:
        tool_input:
          command: "mysql -h db.example.com -u admin -e \"DROP TABLE legacy_table\""
      expected_exit: 2
    # Greptile finding (P1, PR #25): the `-e` alternative is a prefix of
    # `--execute`. Earlier patterns that anchored `(-e|--execute)` without
    # boundary handling, or that required whitespace BEFORE `=`, missed the
    # long-option form and the `--execute="..."` shape entirely. These cases
    # exercise both bypasses.
    - name: blocks-mysql-long-execute-space
      input:
        tool_input:
          command: 'mysql --execute "UPDATE users SET active=1"'
      expected_exit: 2
    - name: blocks-mysql-long-execute-equals
      input:
        tool_input:
          command: 'mysql --execute="DROP TABLE legacy"'
      expected_exit: 2
    - name: blocks-mysql-short-e-no-space-quoted
      input:
        tool_input:
          command: 'mysql -uroot -e"DROP TABLE legacy"'
      expected_exit: 2
    - name: blocks-mysql-stdin-redirect
      input:
        tool_input:
          command: 'mysql -u root mydb < migrations/oneshot.sql'
      expected_exit: 2
    - name: blocks-mysqldump-pipe-mysql
      input:
        tool_input:
          command: 'mysqldump -u root prod_db | mysql -u root staging_db'
      expected_exit: 2
    - name: allows-mysql-e-select
      input:
        tool_input:
          command: "mysql -u root -e 'SELECT COUNT(*) FROM users'"
      expected_exit: 0
    - name: allows-mysql-e-show
      input:
        tool_input:
          command: "mysql -u root -e 'SHOW TABLES'"
      expected_exit: 0
    - name: allows-mysql-via-versioned-script
      input:
        tool_input:
          command: "./scripts/seed-users.sh"
      expected_exit: 0
    - name: allows-mysql-via-bash-scripts-prefix
      input:
        tool_input:
          command: "bash scripts/migrate-prod.sh --confirm"
      expected_exit: 0
    - name: allows-bypass-marker
      input:
        tool_input:
          command: "mysql -u root -e 'DROP TABLE foo' # hook-bypass: db-mutation-rule"
      expected_exit: 0

- id: inline-db-mutation-psql
  description: Block inline psql / pg_restore mutations beyond the destructive ops already caught by destructive-db-ops (use a versioned migration or script instead)
  applies_to: [Bash]
  match:
    # Positive: psql -c "<mutation>" with the broader keyword set, plus
    # pg_restore against any non-localhost host. The `destructive-db-ops`
    # rule above already blocks DROP TABLE/DATABASE/SCHEMA / TRUNCATE /
    # DELETE FROM via psql -c; here we extend coverage to UPDATE / INSERT
    # / REPLACE / CREATE / ALTER / GRANT / REVOKE / RENAME so the full
    # mutation set is consistently denied at the CLI.
    # NOTE: spacing between `-c`/`--command` and the SQL keyword is
    # `[[:space:]]*` (zero-or-more), NOT `[[:space:]]+` — psql accepts the
    # short form `psql -d mydb -c"UPDATE ..."` with no separator (Greptile
    # #25 P1).
    - field: command
      pattern: '(\bpsql\b[^|]*(-c|--command)([[:space:]]*|=)[''"]?[[:space:]]*(UPDATE|INSERT|REPLACE|CREATE|ALTER|GRANT|REVOKE|RENAME)\b)|(\bpg_restore\b)'
      flags: i
    - field: command
      not_pattern: '^[[:space:]]*(\./scripts/|bash[[:space:]]+scripts/|\./bin/|bash[[:space:]]+bin/|sh[[:space:]]+scripts/|sh[[:space:]]+bin/)'
  action: block
  bypass_marker: db-mutation-rule
  disable_if_repo_file: .no-make-no-mistakes-db-mutation
  memory_ref: feedback_scripts_not_db.md
  message: |
    BLOCKED: inline psql mutation or pg_restore detected.

    Per feedback_scripts_not_db.md: schema and data changes belong in a
    versioned migration (supabase/migrations/<ts>_<slug>.sql or your
    project's equivalent), not in an ad-hoc `psql -c` one-liner.

    For pg_restore: load the dump from a committed script that documents
    target DB, dump version, and the rollback plan — never from a raw
    shell invocation that exists only in the agent's transient history.

    SELECT / SHOW / EXPLAIN / DESCRIBE are still allowed inline.

    Bypass with `# hook-bypass: db-mutation-rule` after explicit team
    approval, or drop `.no-make-no-mistakes-db-mutation` at the repo root.
  tests:
    - name: blocks-psql-c-update
      input:
        tool_input:
          command: 'psql -h db.example.com -d mydb -c "UPDATE users SET active=true"'
      expected_exit: 2
    - name: blocks-psql-c-insert
      input:
        tool_input:
          command: "psql -d mydb -c 'INSERT INTO audit (action) VALUES (''oneshot'')'"
      expected_exit: 2
    - name: blocks-psql-c-alter-table
      input:
        tool_input:
          command: 'psql -d mydb -c "ALTER TABLE users ADD COLUMN nickname text"'
      expected_exit: 2
    - name: blocks-psql-c-grant
      input:
        tool_input:
          command: 'psql -d mydb -c "GRANT SELECT ON users TO readonly_role"'
      expected_exit: 2
    # Greptile finding (P1, PR #25): psql accepts the short-option form where
    # the SQL follows `-c` immediately, without whitespace or `=`. Original
    # pattern required `[[:space:]]+|=` after `-c`, missing `-c"..."`.
    - name: blocks-psql-c-no-space-quoted
      input:
        tool_input:
          command: 'psql -d mydb -c"UPDATE users SET active=true"'
      expected_exit: 2
    - name: blocks-psql-long-command-equals
      input:
        tool_input:
          command: 'psql -d mydb --command="UPDATE sessions SET expired=true"'
      expected_exit: 2
    - name: blocks-pg-restore
      input:
        tool_input:
          command: 'pg_restore -h db.example.com -d mydb backup.dump'
      expected_exit: 2
    - name: allows-psql-c-select
      input:
        tool_input:
          command: "psql -d mydb -c 'SELECT count(*) FROM users'"
      expected_exit: 0
    - name: allows-psql-c-explain
      input:
        tool_input:
          command: "psql -d mydb -c 'EXPLAIN ANALYZE SELECT * FROM users'"
      expected_exit: 0
    - name: allows-psql-via-versioned-script
      input:
        tool_input:
          command: "./scripts/db-migrate.sh"
      expected_exit: 0
    - name: allows-bypass-marker
      input:
        tool_input:
          command: 'psql -d mydb -c "UPDATE users SET active=true" # hook-bypass: db-mutation-rule'
      expected_exit: 0

- id: inline-db-mutation-sqlite
  description: Block inline sqlite3 mutations (use a versioned script in scripts/ or bin/ instead)
  applies_to: [Bash]
  match:
    # Positive: `sqlite3 <path-to.db> "<SQL>"` is the canonical shape;
    # the SQL argument is the positional after the database path. Match
    # invocations where any mutation keyword appears anywhere on the
    # command line after `sqlite3 ` (cheaper than parsing positional args
    # and still effective because the keyword set is unique enough to
    # mutations).
    - field: command
      pattern: '\bsqlite3\b[^|]*\b(UPDATE|DELETE|INSERT|REPLACE|CREATE|ALTER|DROP|GRANT|REVOKE|TRUNCATE|RENAME)\b'
      flags: i
    - field: command
      not_pattern: '^[[:space:]]*(\./scripts/|bash[[:space:]]+scripts/|\./bin/|bash[[:space:]]+bin/|sh[[:space:]]+scripts/|sh[[:space:]]+bin/)'
  action: block
  bypass_marker: db-mutation-rule
  disable_if_repo_file: .no-make-no-mistakes-db-mutation
  memory_ref: feedback_scripts_not_db.md
  message: |
    BLOCKED: inline sqlite3 DB mutation detected.

    Even for local SQLite databases, drift between dev machines is a
    real cost — when one teammate's local DB has the manual change and
    others' don't, debugging session reproduction degrades silently.
    Move the SQL into scripts/ and commit it.

    SELECT / EXPLAIN remain allowed inline. The bypass marker is
    `db-mutation-rule`. Per-repo opt-out:
    `touch .no-make-no-mistakes-db-mutation` at the root.
  tests:
    - name: blocks-sqlite3-update
      input:
        tool_input:
          command: 'sqlite3 ./data.db "UPDATE users SET active=1"'
      expected_exit: 2
    - name: blocks-sqlite3-delete
      input:
        tool_input:
          command: "sqlite3 ./data.db 'DELETE FROM users WHERE id=42'"
      expected_exit: 2
    - name: blocks-sqlite3-create-table
      input:
        tool_input:
          command: 'sqlite3 ./data.db "CREATE TABLE foo (id integer primary key)"'
      expected_exit: 2
    - name: blocks-sqlite3-alter
      input:
        tool_input:
          command: 'sqlite3 ./data.db "ALTER TABLE users ADD COLUMN x text"'
      expected_exit: 2
    - name: allows-sqlite3-select
      input:
        tool_input:
          command: 'sqlite3 ./data.db "SELECT count(*) FROM users"'
      expected_exit: 0
    - name: allows-sqlite3-via-versioned-script
      input:
        tool_input:
          command: './scripts/seed-sqlite.sh ./data.db'
      expected_exit: 0
    - name: allows-bypass-marker
      input:
        tool_input:
          command: 'sqlite3 ./data.db "UPDATE users SET active=1" # hook-bypass: db-mutation-rule'
      expected_exit: 0

- id: inline-db-mutation-mongo
  description: Block inline mongo / mongorestore mutations (use a versioned script in scripts/ or bin/ instead)
  applies_to: [Bash]
  match:
    # Positive vectors:
    #   1. `mongo --eval "<expr with .update/.insert/.delete/...>"` — the
    #      legacy shell syntax. Mongosh uses the same flag.
    #   2. `mongosh --eval` — same surface, newer binary name.
    #   3. `mongorestore ...` — bulk restore one-liner. Block unconditionally
    #      since by definition it overwrites collections.
    # Mutation method set is the canonical write surface (.update, .insert,
    # .delete, .drop, .createCollection, .dropDatabase, .replaceOne, .save,
    # .findAndModify, .deleteOne, .deleteMany, .updateOne, .updateMany,
    # .insertOne, .insertMany).
    # NOTE: scan for the mutation method anywhere up to a pipe after `--eval`,
    # using `[[:space:]=]` to accept both the space form (`--eval "..."`) and
    # the equals form (`--eval="..."`). Greptile #25 P1: the previous shape
    # `[[:space:]]+[^[:space:]]*\.method` only matched if the mutation method
    # appeared inside a single non-space token immediately after `--eval`,
    # which fails the moment a quoted JS expression contains a space anywhere
    # before the `.method` call.
    - field: command
      pattern: '(\b(mongo|mongosh)\b[^|]*--eval[[:space:]=][^|]*\.(update|insert|delete|drop|createCollection|dropDatabase|replaceOne|save|findAndModify|deleteOne|deleteMany|updateOne|updateMany|insertOne|insertMany)\b)|(\bmongorestore\b)'
    - field: command
      not_pattern: '^[[:space:]]*(\./scripts/|bash[[:space:]]+scripts/|\./bin/|bash[[:space:]]+bin/|sh[[:space:]]+scripts/|sh[[:space:]]+bin/)'
  action: block
  bypass_marker: db-mutation-rule
  disable_if_repo_file: .no-make-no-mistakes-db-mutation
  memory_ref: feedback_scripts_not_db.md
  message: |
    BLOCKED: inline mongo / mongosh / mongorestore mutation detected.

    Per feedback_scripts_not_db.md, mongo data changes belong in a
    versioned migration runner script — never in a transient `--eval`
    one-liner. The bypass marker is `db-mutation-rule`; the per-repo
    escape hatch is `.no-make-no-mistakes-db-mutation` at the root.

    Read methods (.find, .findOne, .aggregate, .countDocuments, etc.)
    remain allowed inline.
  tests:
    - name: blocks-mongo-eval-update
      input:
        tool_input:
          command: 'mongo --eval "db.users.update({_id:42},{$set:{active:true}})"'
      expected_exit: 2
    # Greptile finding (P1, PR #25): `--eval` is almost always followed by a
    # quoted JavaScript expression that contains whitespace. The original
    # pattern required the mutation method inside the FIRST non-space token
    # after `--eval`, which the quote+space layout breaks. These cases
    # exercise the realistic shapes seen in incident-driven one-liners.
    - name: blocks-mongo-eval-update-with-spaces-inside-arg
      input:
        tool_input:
          command: 'mongo --eval "db.users.update({_id: 42}, {$set: {active: true}})"'
      expected_exit: 2
    - name: blocks-mongosh-eval-insertOne-spaces
      input:
        tool_input:
          command: 'mongosh --eval "db.audit.insertOne({ event: \"oneshot\" })"'
      expected_exit: 2
    - name: blocks-mongo-eval-equals
      input:
        tool_input:
          command: 'mongo --eval="db.users.deleteMany({active:false})"'
      expected_exit: 2
    - name: blocks-mongo-eval-deleteMany
      input:
        tool_input:
          command: 'mongo --eval "db.sessions.deleteMany({expired:true})"'
      expected_exit: 2
    - name: blocks-mongosh-eval-drop
      input:
        tool_input:
          command: 'mongosh --eval "db.legacy_collection.drop()"'
      expected_exit: 2
    - name: blocks-mongo-eval-createCollection
      input:
        tool_input:
          command: 'mongo --eval "db.createCollection(''audit'')"'
      expected_exit: 2
    - name: blocks-mongorestore
      input:
        tool_input:
          command: 'mongorestore --db prod --drop ./backup'
      expected_exit: 2
    - name: allows-mongo-eval-find
      input:
        tool_input:
          command: 'mongo --eval "db.users.find({active:true}).count()"'
      expected_exit: 0
    - name: allows-mongo-eval-aggregate
      input:
        tool_input:
          command: 'mongo --eval "db.events.aggregate([{$match:{}}])"'
      expected_exit: 0
    - name: allows-mongo-via-versioned-script
      input:
        tool_input:
          command: './scripts/seed-mongo.sh'
      expected_exit: 0
    - name: allows-bypass-marker
      input:
        tool_input:
          command: 'mongo --eval "db.users.drop()" # hook-bypass: db-mutation-rule'
      expected_exit: 0

- id: inline-db-mutation-redis
  description: Block inline redis-cli mutations (use a versioned script in scripts/ or bin/ instead)
  applies_to: [Bash]
  match:
    # Positive: `redis-cli ... <MUTATING_VERB> ...`. The Redis command
    # surface is large — match the common write verbs that show up in
    # incident-driven one-liners: SET, DEL, FLUSHDB, FLUSHALL, HSET,
    # HDEL, SADD, SREM, LPUSH, RPUSH, ZADD, ZREM, EXPIRE, RENAME, MSET,
    # SETEX, SETNX, INCR, DECR, COPY, MOVE, UNLINK, RESTORE, EVAL (EVAL
    # can mutate via Lua even though it can also read).
    # Verb must be at command-word boundaries to avoid mis-matching
    # values that happen to contain those substrings.
    - field: command
      pattern: '\bredis-cli\b[^|]*[[:space:]]+(SET|DEL|FLUSHDB|FLUSHALL|HSET|HDEL|SADD|SREM|LPUSH|RPUSH|ZADD|ZREM|EXPIRE|RENAME|MSET|SETEX|SETNX|INCR|DECR|COPY|MOVE|UNLINK|RESTORE|EVAL)\b'
      flags: i
    - field: command
      not_pattern: '^[[:space:]]*(\./scripts/|bash[[:space:]]+scripts/|\./bin/|bash[[:space:]]+bin/|sh[[:space:]]+scripts/|sh[[:space:]]+bin/)'
  action: block
  bypass_marker: db-mutation-rule
  disable_if_repo_file: .no-make-no-mistakes-db-mutation
  memory_ref: feedback_scripts_not_db.md
  message: |
    BLOCKED: inline redis-cli mutation detected.

    Even in a cache, manual one-liners create cross-env drift: the value
    you set is visible to your machine only until eviction, and other
    engineers cannot reproduce. Use a script under scripts/ or bin/.

    Read verbs (GET, MGET, HGET, KEYS, SCAN, INFO, PING, EXISTS, TYPE,
    TTL, LLEN, SCARD, ZRANGE, SMEMBERS, ...) remain allowed inline.

    Bypass marker: `db-mutation-rule`. Per-repo opt-out:
    `touch .no-make-no-mistakes-db-mutation` at the root.
  tests:
    - name: blocks-redis-cli-set
      input:
        tool_input:
          command: 'redis-cli SET feature:enabled 1'
      expected_exit: 2
    - name: blocks-redis-cli-del
      input:
        tool_input:
          command: 'redis-cli DEL session:42'
      expected_exit: 2
    - name: blocks-redis-cli-flushall
      input:
        tool_input:
          command: 'redis-cli -h cache.example.com FLUSHALL'
      expected_exit: 2
    - name: blocks-redis-cli-flushdb
      input:
        tool_input:
          command: 'redis-cli -n 3 FLUSHDB'
      expected_exit: 2
    - name: blocks-redis-cli-hset
      input:
        tool_input:
          command: 'redis-cli HSET user:1 name alice'
      expected_exit: 2
    - name: allows-redis-cli-get
      input:
        tool_input:
          command: 'redis-cli GET feature:enabled'
      expected_exit: 0
    - name: allows-redis-cli-keys
      input:
        tool_input:
          command: 'redis-cli KEYS "session:*"'
      expected_exit: 0
    - name: allows-redis-cli-info
      input:
        tool_input:
          command: 'redis-cli INFO memory'
      expected_exit: 0
    - name: allows-redis-via-versioned-script
      input:
        tool_input:
          command: './scripts/flush-cache.sh'
      expected_exit: 0
    - name: allows-bypass-marker
      input:
        tool_input:
          command: 'redis-cli FLUSHALL # hook-bypass: db-mutation-rule'
      expected_exit: 0

- id: inline-db-mutation-gcloud-sql
  description: Block inline `gcloud sql import` / `gcloud sql export` (use a versioned script in scripts/ or bin/ that documents the source/destination)
  applies_to: [Bash]
  match:
    # Positive: import/export of SQL or CSV dumps via the gcloud SQL CLI.
    # Both directions are blocked: import is the obvious mutation surface;
    # export is included because exports against PRODUCTION leak PII and
    # consume IOPS, so the discipline (versioned script with documented
    # purpose) applies equally.
    # NOTE: gcloud accepts global flags BEFORE the command group, so we must
    # tolerate zero-or-more arbitrary tokens between `gcloud` and `sql`.
    # The `([^[:space:]]+[[:space:]]+)*` group matches any token-then-space
    # repetition, which covers BOTH shapes that gcloud accepts for global
    # flags taking a value:
    #   --flag=value       (one token)        e.g. `--project=my-prod`
    #   --flag value       (two tokens)       e.g. `--project my-prod`
    # ...plus bare bool flags (`--quiet`, `-q`), `--account user@host`,
    # `--configuration prod`, `--impersonate-service-account svc@example.com`,
    # `--region us-central1`, `--zone us-central1-a`, etc. Greptile re-review
    # on PR #25 surfaced that the prior `(--?[a-zA-Z0-9_-]+(=[^[:space:]]*)?[[:space:]]+)*`
    # shape only matched the `=`-bound form and missed every space-separated
    # global flag value. The looser tokens-then-space loop closes that gap.
    # False-positive risk is bounded: the pattern still anchors on the
    # literal `sql[[:space:]]+(import|export)[[:space:]]+(sql|csv|bak)` tail,
    # so legitimate read-only verbs (`sql instances list`, `sql databases
    # describe`, ...) cannot match.
    - field: command
      pattern: '\bgcloud[[:space:]]+([^[:space:]]+[[:space:]]+)*sql[[:space:]]+(import|export)[[:space:]]+(sql|csv|bak)\b'
      flags: i
    - field: command
      not_pattern: '^[[:space:]]*(\./scripts/|bash[[:space:]]+scripts/|\./bin/|bash[[:space:]]+bin/|sh[[:space:]]+scripts/|sh[[:space:]]+bin/)'
  action: block
  bypass_marker: db-mutation-rule
  disable_if_repo_file: .no-make-no-mistakes-db-mutation
  memory_ref: feedback_scripts_not_db.md
  references:
    - "feedback_never_touch_prod_without_approval.md (production guardrail)"
  message: |
    BLOCKED: inline `gcloud sql import` / `gcloud sql export` detected.

    Imports overwrite target DB state. Exports against production cost
    IOPS and (when carrying PII) violate the data-handling guidelines.
    Both belong in a versioned script that documents:
      - source / destination instance IDs (PROD vs STAGING)
      - dump version (timestamped GCS URI)
      - PII-handling approval if any
      - rollback procedure

    Bypass marker: `db-mutation-rule`. Per-repo opt-out:
    `touch .no-make-no-mistakes-db-mutation` at the root.
  tests:
    - name: blocks-gcloud-sql-import-sql
      input:
        tool_input:
          command: 'gcloud sql import sql my-instance gs://backups/dump.sql --database=mydb'
      expected_exit: 2
    - name: blocks-gcloud-sql-export-sql
      input:
        tool_input:
          command: 'gcloud sql export sql my-instance gs://backups/dump.sql --database=mydb'
      expected_exit: 2
    - name: blocks-gcloud-sql-import-csv
      input:
        tool_input:
          command: 'gcloud sql import csv my-instance gs://backups/users.csv --database=mydb --table=users'
      expected_exit: 2
    - name: blocks-gcloud-sql-export-bak
      input:
        tool_input:
          command: 'gcloud sql export bak my-instance gs://backups/dump.bak --database=mydb'
      expected_exit: 2
    # Greptile finding (P1+Security, PR #25): `gcloud` accepts global flags
    # BEFORE the command group. The previous pattern required `gcloud sql`
    # contiguously, missing `gcloud --project=my-prod sql ...` — exactly the
    # shape used when targeting a specific project (i.e., production).
    - name: blocks-gcloud-global-project-sql-export
      input:
        tool_input:
          command: 'gcloud --project=my-prod sql export sql my-instance gs://backups/dump.sql --database=mydb'
      expected_exit: 2
    - name: blocks-gcloud-global-quiet-sql-import
      input:
        tool_input:
          command: 'gcloud --quiet sql import sql my-instance gs://backups/dump.sql --database=mydb'
      expected_exit: 2
    - name: blocks-gcloud-global-account-sql-export-csv
      input:
        tool_input:
          command: 'gcloud --account=svc@example.iam.gserviceaccount.com sql export csv my-instance gs://backups/users.csv --database=mydb --query="SELECT * FROM users"'
      expected_exit: 2
    - name: blocks-gcloud-multiple-global-flags-sql-export
      input:
        tool_input:
          command: 'gcloud --project=my-prod --quiet sql export sql my-instance gs://backups/dump.sql --database=mydb'
      expected_exit: 2
    # Greptile re-review on PR #25: the `=`-bound match wasn't enough.
    # gcloud also accepts global flags as TWO space-separated tokens
    # (`--project my-prod`, `--configuration prod`, etc.). Each of the
    # five cases below would have bypassed the old regex.
    - name: blocks-gcloud-global-project-space-sql-export
      input:
        tool_input:
          command: 'gcloud --project my-prod sql export sql my-instance gs://backups/dump.sql --database=mydb'
      expected_exit: 2
    - name: blocks-gcloud-global-configuration-space-sql-import
