      expected_exit: 2
    - name: blocks-gcloud-global-account-space-sql-export-csv
      input:
        tool_input:
          command: 'gcloud --account user@example.com sql export csv my-instance gs://backups/users.csv --database=mydb --query="SELECT * FROM users"'
      expected_exit: 2
    - name: blocks-gcloud-global-region-space-sql-import
      input:
        tool_input:
          command: 'gcloud --region us-central1 sql import sql my-instance gs://backups/dump.sql --database=mydb'
      expected_exit: 2
    - name: blocks-gcloud-mixed-space-and-equals-flags-sql-export
      input:
        tool_input:
          command: 'gcloud --project my-prod --configuration=prod --quiet sql export bak my-instance gs://backups/dump.bak --database=mydb'
