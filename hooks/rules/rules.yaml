# =============================================================================
# make-no-mistakes — Rules manifest (SSoT)
#
# This file is the single source of truth for all enforcement rules.
# Memories (~/.claude/.../memory/feedback_*.md) and per-repo CLAUDE.md
# citations should reference rule ids defined here, not paraphrase the rules.
#
# Schema (per row):
#   id: kebab-case unique identifier
#   description: one-line summary (shown in stderr on match)
#   applies_to: [Bash | Edit | Write | MultiEdit | Slack]
#       Determines which dispatcher (pre-bash.sh, pre-edit.sh, post-slack.sh)
#       picks up the rule.
#   match: array of conditions, ALL must hold (AND-chain)
#     - field: command | file_path | content | text
#       pattern: ERE regex; if present, field must match
#       not_pattern: ERE regex; if present, field must NOT match
#       flags: i (case-insensitive) | (omitted, case-sensitive)
#   action: block | warn
#   bypass_marker: kebab-case id used in "// hook-bypass: <marker>" comments;
#       null if no bypass is offered. Bypass tokens are searched in any
#       string field of tool_input.
#   memory_ref: filename of the corresponding feedback memory
#   references: array of external doc references (free text)
#   message: multi-line stderr output shown on match
#   tests: array of unit tests
#     - name: kebab-case test id
#       input: { tool_input: { ... } }   # JSON passed to the hook on stdin
#       expected_exit: 0 | 2
#
# How to add a new rule: see hooks/rules/README.md
# =============================================================================

- id: ssh-db-mutation
  description: Block gcloud compute ssh with inline DB or Moodle config commands
  applies_to: [Bash]
  match:
    - field: command
      pattern: 'gcloud[[:space:]]+compute[[:space:]]+ssh.*--command.*(php[[:space:]]+-r|set_config|mdl_|scorm_|mysql[[:space:]]+-|mysqldump|\$DB->)'
  action: block
  bypass_marker: ssh-db-rule
  memory_ref: feedback_scripts_not_db.md
  message: |
    BLOCKED: gcloud compute ssh + inline DB/Moodle command detected.

    Use a versioned script in scripts/ instead. If none fits, write+commit
    one first. Bypass: add "// hook-bypass: ssh-db-rule" to the command.
  tests:
    - name: blocks-ssh-php-r
      input:
        tool_input:
          command: 'gcloud compute ssh acme-vm --command="docker exec moodle php -r ''var_dump(1);''"'
      expected_exit: 2
    - name: blocks-ssh-set-config
      input:
        tool_input:
          command: 'gcloud compute ssh acme-vm --command="set_config(''foo'', ''bar'', ''moodlecourse'')"'
      expected_exit: 2
    - name: blocks-ssh-mysql-shell
      input:
        tool_input:
          command: 'gcloud compute ssh acme-vm --command="mysql -u root -e ''SELECT 1''"'
      expected_exit: 2
    - name: allows-regular-ssh
      input:
        tool_input:
          command: 'gcloud compute ssh acme-vm --command="ls /var/log"'
      expected_exit: 0
    - name: allows-bypass-marker
      input:
        tool_input:
          command: 'gcloud compute ssh acme-vm --command="php -r ''echo 1;''" # hook-bypass: ssh-db-rule'
      expected_exit: 0

- id: gcloud-missing-project
  description: Warn when gcloud command is missing --project= flag
  applies_to: [Bash]
  match:
    # Allow zero or more global flags (--verbosity=debug, --quiet, etc.)
    # between `gcloud` and the subcommand. Without this allowance, a
    # command like `gcloud --verbosity=debug compute instances list`
    # would slip past the warning even though it lacks --project=.
    - field: command
      pattern: '^[[:space:]]*gcloud([[:space:]]+--[a-zA-Z0-9_-]+(=[^[:space:]]+)?)*[[:space:]]+(compute|sql|run|iam|secrets|projects|storage|functions|builds|artifacts|container|auth)[[:space:]]'
      not_pattern: '--project[= ]|gcloud([[:space:]]+--[a-zA-Z0-9_-]+(=[^[:space:]]+)?)*[[:space:]]+(version|help|info|config)[[:space:]]'
  action: warn
  bypass_marker: null
  memory_ref: feedback_gcloud_explicit_flags.md
  references: []
  message: |
    WARNING: gcloud command without explicit --project= flag.

    Active config drift can cause cross-project mistakes. Pass --project=<id>
    on every gcloud command (and --account= for multi-account setups).
  tests:
    - name: warns-on-compute-without-project
      input:
        tool_input:
          command: 'gcloud compute instances list'
      expected_exit: 0
      expected_stderr_contains: 'gcloud-missing-project'
    - name: allows-with-project
      input:
        tool_input:
          command: 'gcloud compute instances list --project=acme-dev'
      expected_exit: 0
    - name: allows-version-subcommand
      input:
        tool_input:
          command: 'gcloud version'
      expected_exit: 0
    - name: warns-with-global-flags-before-subcommand
      input:
        tool_input:
          command: 'gcloud --verbosity=debug compute instances list'
      expected_exit: 0
      expected_stderr_contains: 'gcloud-missing-project'

- id: prod-ops-no-approval
  description: Block production operations without explicit user acknowledgement
  applies_to: [Bash]
  match:
    - field: command
      pattern: '--project=([a-z0-9-]+-prod\b|production\b)|--env=prod\b|\bENV=prod\b|--target=prod\b'
  action: block
  bypass_marker: prod-ops
  memory_ref: feedback_never_touch_prod_without_approval.md
  references: []
  message: |
    BLOCKED: production operation detected.

    Production changes require explicit user approval. Once confirmed, add
    "// hook-bypass: prod-ops" to the command to acknowledge.
  tests:
    - name: blocks-prod-project-flag
      input:
        tool_input:
          command: 'gcloud --project=acme-prod compute instances list'
      expected_exit: 2
    - name: blocks-env-prod
      input:
        tool_input:
          command: 'ENV=prod npm run deploy'
      expected_exit: 2
    - name: allows-staging
      input:
        tool_input:
          command: 'gcloud --project=acme-dev compute instances list'
      expected_exit: 0
    - name: allows-bypass
      input:
        tool_input:
          command: 'gcloud --project=acme-prod compute instances list # hook-bypass: prod-ops'
      expected_exit: 0

- id: destructive-db-ops
  description: Block destructive DB operations even with --local
  applies_to: [Bash]
  match:
    - field: command
      pattern: 'supabase[[:space:]]+db[[:space:]]+(reset|push|repair)\b|psql[^|]*\b(DROP[[:space:]]+(TABLE|DATABASE|SCHEMA)|TRUNCATE|DELETE[[:space:]]+FROM)\b'
  action: block
  bypass_marker: db-destructive
  memory_ref: feedback_db_ops_explicit_permission.md
  references: []
  message: |
    BLOCKED: destructive DB operation.

    Even with --local, ask explicit user permission first. Once confirmed,
    add "// hook-bypass: db-destructive" to the command.
  tests:
    - name: blocks-supabase-reset
      input:
        tool_input:
          command: 'supabase db reset --local'
      expected_exit: 2
    - name: blocks-psql-drop-table
      input:
        tool_input:
          command: 'psql -c "DROP TABLE users"'
      expected_exit: 2
    - name: blocks-psql-truncate
      input:
        tool_input:
          command: 'psql -c "TRUNCATE users"'
      expected_exit: 2
    - name: allows-supabase-status
      input:
        tool_input:
          command: 'supabase status'
      expected_exit: 0
    - name: allows-bypass
      input:
        tool_input:
          command: 'supabase db reset --local # hook-bypass: db-destructive'
      expected_exit: 0

- id: manual-edge-fn-deploy
  description: Block manual Edge Function deploy (CI-only)
  applies_to: [Bash]
  match:
    - field: command
      pattern: 'supabase[[:space:]]+functions[[:space:]]+deploy\b'
  action: block
  bypass_marker: edge-fn-manual
  memory_ref: feedback_edge_functions_via_ci.md
  references: []
  message: |
    BLOCKED: manual Edge Function deploy.

    Deploy via CI workflow (push to develop for staging, main for prod).
    Bypass: add "// hook-bypass: edge-fn-manual" if a hotfix justifies it.
  tests:
    - name: blocks-functions-deploy
      input:
        tool_input:
          command: 'supabase functions deploy my-function'
      expected_exit: 2
    - name: allows-functions-list
      input:
        tool_input:
          command: 'supabase functions list'
      expected_exit: 0
    - name: allows-bypass
      input:
        tool_input:
          command: 'supabase functions deploy my-function # hook-bypass: edge-fn-manual'
      expected_exit: 0

- id: minified-build-output
  description: Block writing minified content to build/ directories
  applies_to: [Edit, Write, MultiEdit]
  match:
    - field: file_path
      pattern: 'amd/build/.*\.min\.js$|dist/.*\.min\.(js|css)$'
    - field: content
      pattern: '(var [a-z]=function|;function [a-z]\(\)|^[a-zA-Z0-9_$]+=function\([a-zA-Z0-9_$,]*\)\{)'
  action: block
  bypass_marker: minified-build
  memory_ref: feedback_no_minified_build.md
  references: []
  message: |
    BLOCKED: minified content being written to build/.

    Build artifacts must stay human-readable. Replace with a readable copy
    of src/. Bypass: "// hook-bypass: minified-build" inside the content.
  tests:
    - name: blocks-minified-amd-build
      input:
        tool_input:
          file_path: 'plugins/foo/amd/build/main.min.js'
          content: 'var a=function(b){return b};var c=function(){};'
      expected_exit: 2
    - name: allows-readable-amd-build
      input:
        tool_input:
          file_path: 'plugins/foo/amd/build/main.min.js'
          content: |
            define(['jquery'], function($) {
                'use strict';
                return {
                    init: function() { console.log('hello'); }
                };
            });
      expected_exit: 0
    - name: allows-non-build-paths
      input:
        tool_input:
          file_path: 'src/utils/helper.js'
          content: 'var a=function(b){return b};'
      expected_exit: 0

- id: secrets-hardcoded
  description: Block hardcoded credential patterns being written to source files
  applies_to: [Edit, Write, MultiEdit]
  match:
    - field: content
      pattern: '(password|secret|api_key|apikey|token|access_key|private_key)["\'']?[[:space:]]*[:=][[:space:]]*["\'']?[A-Za-z0-9_!@#$%^&*+/=-]{12,}'
      flags: i
    - field: file_path
      not_pattern: '\.env\.example|\.(test|spec)\.|README|\.md$|fixtures/|mocks?/'
  action: block
  bypass_marker: secret-leak
  memory_ref: feedback_never_leak_secrets.md
  references: []
  message: |
    POTENTIAL SECRET LEAK: hardcoded credential pattern detected.

    Use Secret Manager / .env / local memory for real values. If this is a
    placeholder or test fixture, prefix with "EXAMPLE_" / "CHANGEME_", move
    to .env.example, or add "// hook-bypass: secret-leak" near the line.
  tests:
    - name: blocks-hardcoded-password-in-src
      input:
        tool_input:
          file_path: 'src/config.ts'
          content: 'const password = "supersecret123ABC!"'
      expected_exit: 2
    - name: blocks-hardcoded-api-key
      input:
        tool_input:
          file_path: 'src/lib/api.ts'
          content: 'const api_key: "sk_live_abc123def456ghi789"'
      expected_exit: 2
    - name: allows-env-example
      input:
        tool_input:
          file_path: '.env.example'
          content: 'PASSWORD=changeme_supersecret_placeholder'
      expected_exit: 0
    - name: allows-bypass
      input:
        tool_input:
          file_path: 'src/config.ts'
          content: 'const password = "supersecret123ABC!" // hook-bypass: secret-leak'
      expected_exit: 0
    - name: allows-test-file
      input:
        tool_input:
          file_path: 'src/auth.test.ts'
          content: 'const password = "supersecret123ABC!"'
      expected_exit: 0

- id: slack-unicode-bullets
  description: Warn on Unicode bullets in Slack messages (use - instead)
  applies_to: [Slack]
  match:
    - field: text
      pattern: '[•◦▪▫]'
  action: warn
  bypass_marker: null
  memory_ref: feedback_slack_no_unicode_bullets.md
  references: []
  message: |
    Slack style: Unicode bullets (•◦▪▫) detected. Use "-" instead.
  tests:
    - name: warns-on-bullet
      input:
        tool_input:
          text: 'Hola • mundo'
      expected_exit: 0
      expected_stderr_contains: slack-unicode-bullets
    - name: allows-dash-bullet
      input:
        tool_input:
          text: 'Hola - mundo'
      expected_exit: 0

- id: slack-tables-no-codeblock
  description: Warn when a markdown table separator row appears in Slack text
  applies_to: [Slack]
  match:
    # Match the distinctive markdown-table separator row (|---|---|).
    # Plain pipe-prose without a separator is too noisy; the separator
    # almost exclusively appears inside actual tables. False-positive: a
    # table legitimately wrapped in a fenced code block still triggers the
    # warning, but warn-only is tolerable. Detecting "inside a code block"
    # reliably from a single regex is not feasible in bash; line-by-line
    # parsing would be needed to do it perfectly.
    - field: text
      pattern: '^\|[-:|[:space:]]+\|[[:space:]]*$'
  action: warn
  bypass_marker: null
  memory_ref: feedback_slack_tables.md
  message: |
    Slack style: markdown table syntax detected.
    Slack mrkdwn does not render bare pipe-tables — wrap the table in
    triple-backtick fences for it to display correctly.
  tests:
    - name: warns-on-bare-table
      input:
        tool_input:
          text: |
            Resultados:
            | col1 | col2 | col3 |
            | ---- | ---- | ---- |
            | a    | b    | c    |
      expected_exit: 0
      expected_stderr_contains: slack-tables-no-codeblock
    - name: allows-message-with-stray-pipes
      input:
        tool_input:
          text: |
            Just a paragraph with | a stray pipe | character — no table here.
      expected_exit: 0

- id: slack-spanish-tildes
  description: Warn when common Spanish words appear without tildes
  applies_to: [Slack]
  match:
    - field: text
      pattern: '\b(migracion|verificacion|analisis|patron|tambien|configuracion|implementacion|version|integracion|notificacion|aplicacion|comunicacion)\b'
      flags: i
  action: warn
  bypass_marker: null
  memory_ref: feedback_spanish_accents.md
  references: []
  message: |
    Slack style: Spanish word without tilde detected. Always write with accents
    (migración, verificación, análisis, patrón, también, configuración, ...).
  tests:
    - name: warns-on-tildeless-migracion
      input:
        tool_input:
          text: 'La migracion fue exitosa'
      expected_exit: 0
      expected_stderr_contains: slack-spanish-tildes
    - name: allows-with-tilde
      input:
        tool_input:
          text: 'La migración fue exitosa'
      expected_exit: 0

# -----------------------------------------------------------------------------
# Design System rules (legacy-ticket)
#
# These four rules implement AI-write-time enforcement for the chimera Design
# System. They are the 4th enforcement layer, complementing the chimera-os
# repo's existing layers:
#   1. useDsRules React hook (passive, runtime-only)
#   2. ds-lint pre-commit hook (post-author, post-write)
#   3. validate-storage-upload Edge Function (Storage bucket uploads)
#   4. THIS layer — PreToolUse on Edit/Write/MultiEdit (write-time, blocks
#      the violation BEFORE the file is touched, tightest feedback loop)
#
# Linear: legacy-ticket (Phase G of legacy-ticket design-system-linter).
# -----------------------------------------------------------------------------

- id: ds-arbitrary-breakpoint
  description: 'Block arbitrary Tailwind breakpoints (min-[Xpx]) in TSX/JSX/TS source — use sm:/md:/lg:/xl:/2xl: preset breakpoints'
  applies_to: [Edit, Write, MultiEdit]
  match:
    - field: file_path
      pattern: '\.(tsx|jsx|ts|js)$'
    - field: content
      pattern: 'min-\[[0-9]+px\]'
  action: block
  bypass_marker: ds-arbitrary-breakpoint
  memory_ref: feedback_design_system_no_arbitrary_breakpoints.md
  message: |
    BLOCKED: arbitrary Tailwind breakpoint detected (min-[Xpx]).

    Use Tailwind's preset breakpoints instead: sm: (640px), md: (768px),
    lg: (1024px), xl: (1280px), 2xl: (1536px). Arbitrary values fragment
    the responsive design language and break consistency across the app.

    If a non-preset breakpoint is genuinely required, add
    "// hook-bypass: ds-arbitrary-breakpoint" to the line and justify
    in the PR description.
  tests:
    - name: blocks-min-1200px-in-tsx
      input:
        tool_input:
          file_path: 'src/components/foo.tsx'
          content: '<div className="min-[1200px]:flex">x</div>'
      expected_exit: 2
    - name: blocks-min-768-arbitrary
      input:
        tool_input:
          file_path: 'src/pages/Bar.tsx'
          content: '<div className="min-[768px]:block">y</div>'
      expected_exit: 2
    - name: allows-preset-md
      input:
        tool_input:
          file_path: 'src/components/foo.tsx'
          content: '<div className="md:flex">x</div>'
      expected_exit: 0
    - name: allows-non-tsx-files
      input:
        tool_input:
          file_path: 'docs/example.md'
          content: 'Use min-[1200px] for ...'
      expected_exit: 0
    - name: allows-bypass-marker
      input:
        tool_input:
          file_path: 'src/components/foo.tsx'
          content: '<div className="min-[1380px]:hidden">x</div> // hook-bypass: ds-arbitrary-breakpoint'
      expected_exit: 0

- id: ds-deep-ui-import
  description: Block deep imports from @/components/ui/<file> — always import from the barrel @/components/ui
  applies_to: [Edit, Write, MultiEdit]
  match:
    - field: file_path
      pattern: '\.(tsx|jsx|ts)$'
    - field: content
      pattern: 'from[[:space:]]+["'']@/components/ui/[a-zA-Z][a-zA-Z0-9_-]+["'']'
  action: block
  bypass_marker: ds-deep-ui-import
  memory_ref: feedback_design_system_barrel_imports.md
  message: |
    BLOCKED: deep import from @/components/ui/<file> detected.

    Always import Design System components from the barrel:
      import { Button, Card, TextInput } from "@/components/ui"

    Deep imports like @/components/ui/button bypass the barrel-controlled
    surface and make refactors brittle. The barrel is the public API.
  tests:
    - name: blocks-deep-button-import
      input:
        tool_input:
          file_path: 'src/pages/Foo.tsx'
          content: 'import { Button } from "@/components/ui/button"'
      expected_exit: 2
    - name: blocks-deep-textinput-import
      input:
        tool_input:
          file_path: 'src/components/Bar.tsx'
          content: "import { TextInput } from '@/components/ui/text-input'"
      expected_exit: 2
    - name: allows-barrel-import
      input:
        tool_input:
          file_path: 'src/pages/Foo.tsx'
          content: 'import { Button, Card } from "@/components/ui"'
      expected_exit: 0
    - name: allows-non-ds-import
      input:
        tool_input:
          file_path: 'src/pages/Foo.tsx'
          content: 'import { foo } from "@/lib/utils"'
      expected_exit: 0
    - name: allows-bypass-marker
      input:
        tool_input:
          file_path: 'src/pages/Foo.tsx'
          content: 'import { Button } from "@/components/ui/button" // hook-bypass: ds-deep-ui-import'
      expected_exit: 0

- id: ds-arbitrary-fixed-width-in-ds-component
  description: Block arbitrary fixed widths (w-[Xpx]) inside DS components — they must be flexible (w-full + max-w)
  applies_to: [Edit, Write, MultiEdit]
  match:
    # Anchor on start-of-string OR a leading "/" so the rule fires for both
    # relative paths ("src/components/ui/...") and absolute paths
    # ("/home/user/repo/src/components/ui/..."). Claude Code's Edit/Write
    # tools may pass either form at runtime.
    - field: file_path
      pattern: '(^|/)src/components/ui/'
    - field: content
      # Require the `w` to NOT be preceded by a letter/dash so we don't
      # mis-flag legitimate composite utilities like max-w-[200px] or
      # min-w-[120px]. ERE has no lookahead, so we anchor on a leading
      # boundary of "start-of-line OR non-[a-zA-Z-] character".
      pattern: '(^|[^a-zA-Z-])w-\[[0-9]+px\]'
  action: block
  bypass_marker: ds-arbitrary-fixed-width
  memory_ref: feedback_design_system_no_fixed_pixel_widths.md
  message: |
    BLOCKED: arbitrary fixed pixel width in a DS component.

    DS components live under src/components/ui/ and must be flexible.
    Use w-full + max-w-[Xpx] instead of w-[Xpx], so the component
    adapts to its container.

    Application-level usage (outside src/components/ui/) is exempt —
    this rule only fires when editing the DS components themselves.
  tests:
    - name: blocks-w-pixel-in-ui-button
      input:
        tool_input:
          file_path: 'src/components/ui/button.tsx'
          content: '<button className="w-[120px]">x</button>'
      expected_exit: 2
    - name: blocks-w-pixel-in-ui-card
      input:
        tool_input:
          file_path: 'src/components/ui/card.tsx'
          content: '<div className="w-[300px] p-4">y</div>'
      expected_exit: 2
    # Regression: Claude Code passes absolute paths to Edit/Write at runtime.
    # Without the (^|/) anchor the rule would silently allow these (the bug
    # Greptile flagged in PR #14).
    - name: blocks-w-pixel-in-ui-button-absolute-path
      input:
        tool_input:
          file_path: '/home/user/repo/src/components/ui/button.tsx'
          content: '<button className="w-[120px]">x</button>'
      expected_exit: 2
    - name: allows-w-pixel-outside-ds
      input:
        tool_input:
          file_path: 'src/pages/Settings.tsx'
          content: '<div className="w-[300px]">page-specific</div>'
      expected_exit: 0
    - name: allows-w-full-max-w
      input:
        tool_input:
          file_path: 'src/components/ui/button.tsx'
          content: '<button className="w-full max-w-[200px]">x</button>'
      expected_exit: 0
    - name: allows-bypass-marker
      input:
        tool_input:
          file_path: 'src/components/ui/special.tsx'
          content: '<div className="w-[42px]">px-perfect-icon</div> // hook-bypass: ds-arbitrary-fixed-width'
      expected_exit: 0

- id: ds-raw-hex-color-in-source
  description: Warn on raw hex color literals in TSX/TS source — colors must come from Tailwind tokens (chimera-primary-*, etc.)
  applies_to: [Edit, Write, MultiEdit]
  match:
    - field: file_path
      pattern: '\.(tsx|jsx|ts|js)$'
      not_pattern: '(tailwind\.config|theme/|design-system/|design-tokens|\.test\.|\.stories\.)'
    - field: content
      pattern: '#[0-9a-fA-F]{6}\b'
  action: warn
  bypass_marker: ds-raw-hex-color
  memory_ref: feedback_design_system_token_only_colors.md
  message: |
    WARNING: raw hex color literal found in source.

    Use a Tailwind token instead (e.g., bg-chimera-primary-lilac, text-chimera-foreground).
    The token system is the single source of truth for color and theming.

    Exempt paths (NOT flagged): tailwind.config.*, theme/, design-system/,
    design-tokens, .test.*, .stories.*. Use the bypass marker if a hex is
    genuinely required outside those paths (e.g. embedding a brand color
    in a logo SVG that the design system doesn't yet expose).
  tests:
    - name: warns-on-raw-hex-in-tsx
      input:
        tool_input:
          file_path: 'src/components/foo.tsx'
          content: '<div style={{ color: "#FF7151" }}>x</div>'
      expected_exit: 0
      expected_stderr_contains: 'ds-raw-hex-color-in-source'
    - name: warns-on-raw-hex-in-ts
      input:
        tool_input:
          file_path: 'src/lib/util.ts'
          content: 'const PRIMARY = "#C980FC"'
      expected_exit: 0
      expected_stderr_contains: 'ds-raw-hex-color-in-source'
    - name: allows-tailwind-config
      input:
        tool_input:
          file_path: 'tailwind.config.ts'
          content: 'lilac: "#C980FC"'
      expected_exit: 0
    - name: allows-theme-file
      input:
        tool_input:
          file_path: 'src/theme/tokens.ts'
          content: 'export const PRIMARY = "#C980FC"'
      expected_exit: 0
    - name: allows-test-file
      input:
        tool_input:
          file_path: 'src/components/foo.test.tsx'
          content: 'expect(color).toBe("#FF7151")'
      expected_exit: 0
    # Lock in the design-system/ exemption so a future regex tweak that
    # accidentally narrows not_pattern fails this test.
    - name: allows-design-system-folder
      input:
        tool_input:
          file_path: 'src/design-system/tokens.ts'
          content: 'export const PRIMARY = "#C980FC"'
      expected_exit: 0
    # Lock in the design-tokens exemption (matches both folder and filename).
    - name: allows-design-tokens-file
      input:
        tool_input:
          file_path: 'src/lib/design-tokens.ts'
          content: 'export const LILAC = "#C980FC"'
      expected_exit: 0
    - name: allows-bypass-marker
      input:
        tool_input:
          file_path: 'src/components/Logo.tsx'
          content: '<svg fill="#FF7151" /> // hook-bypass: ds-raw-hex-color'
      expected_exit: 0

# -----------------------------------------------------------------------------
# Database / migration discipline rules
#
# These four rules prevent the class of drift that occurs when migration files
# fail to auto-run in a downstream environment and the workaround is to apply
# the SQL manually via psql / the Supabase SQL Editor — leaving the migrations
# directory and downstream databases silently out of sync.
#
# Layered defense:
#   1. schema-sql-outside-migrations — block ad-hoc DDL in non-migration files
#   2. warn-psql-against-supabase-remote — nudge away from SQL-Editor-style
#      direct execution (psql / pg_dump / pg_restore) against any *.supabase.co
#      host
#   3. pr-create-with-migrations-needs-deploy-note — remind the author to
#      describe migration deployment when opening a PR
#   4. block-supabase-db-push-prod — hard stop on `supabase db push` aimed at
#      the PRODUCTION project ref OR --linked (which may transparently target
#      a previously-linked production project); only the create-release SOP
#      may apply migrations to prod.
#
# Rule 4 references project-ref placeholders __PROD_SUPABASE_REF__ and
# __STAGING_SUPABASE_REF__. The `npm run build-rules` step substitutes these
# from the per-install gitignored config at .private/substitutions.json
# (UPPER_SNAKE token map). Without the config the placeholders remain
# in rules.json — the rule still parses and runs, but it only fires for
# commands that literally contain the placeholder text (i.e., it is
# documented inert). See hooks/rules/README.md for the substitution workflow.
# -----------------------------------------------------------------------------

- id: schema-sql-outside-migrations
  description: Block schema-changing SQL (ALTER/CREATE/DROP/GRANT/REVOKE/CREATE POLICY) in .sql files outside supabase/migrations/
  applies_to: [Edit, Write, MultiEdit]
  match:
    - field: file_path
      pattern: '\.sql$'
      not_pattern: '(supabase/migrations/|supabase/tests/|supabase/seed)'
    - field: content
      pattern: '\b(ALTER TABLE|CREATE TABLE|DROP TABLE|CREATE POLICY|DROP POLICY|GRANT |REVOKE |CREATE FUNCTION|DROP FUNCTION|CREATE TYPE|ALTER TYPE)\b'
      flags: i
  action: block
  bypass_marker: schema-sql-outside-migrations
  memory_ref: feedback_scripts_not_db.md
  message: |
    BLOCKED: schema-changing SQL in a file outside supabase/migrations/.

    Every schema mutation (ALTER/CREATE/DROP/GRANT/POLICY) MUST live in a
    timestamped migration file, never in ad-hoc scripts or runtime queries.

    Create a new file:
      supabase/migrations/$(date -u +%Y%m%d%H%M%S)_<slug>.sql

    Legitimate exceptions (use the bypass marker):
    - Schema docs / examples in READMEs — should not be executable SQL
    - Test fixtures under supabase/tests/ — already exempt via not_pattern
  tests:
    - name: blocks-create-table-in-script
      input:
        tool_input:
          file_path: 'scripts/setup.sql'
          content: 'CREATE TABLE foo (id int primary key);'
      expected_exit: 2
    - name: blocks-grant-in-edge-function
      input:
        tool_input:
          file_path: 'supabase/functions/foo/migrate.sql'
          content: 'GRANT SELECT ON foo TO authenticated;'
      expected_exit: 2
    - name: blocks-alter-table-in-readme-example
      input:
        tool_input:
          file_path: 'docs/example.sql'
          content: 'ALTER TABLE foo ADD COLUMN bar text;'
      expected_exit: 2
    - name: allows-schema-in-migrations-folder
      input:
        tool_input:
          file_path: 'supabase/migrations/20260509000000_foo.sql'
          content: 'CREATE TABLE foo (id int primary key);'
      expected_exit: 0
    - name: allows-schema-in-tests-folder
      input:
        tool_input:
          file_path: 'supabase/tests/foo_test.sql'
          content: 'CREATE TABLE temp_test_t (id int);'
      expected_exit: 0
    - name: allows-non-schema-sql-anywhere
      input:
        tool_input:
          file_path: 'scripts/query.sql'
          content: 'SELECT * FROM foo;'
      expected_exit: 0
    - name: allows-bypass-marker
      input:
        tool_input:
          file_path: 'scripts/oneshot.sql'
          content: |
            -- # hook-bypass: schema-sql-outside-migrations
            CREATE TABLE foo (id int primary key);
      expected_exit: 0

- id: warn-psql-against-supabase-remote
  description: Warn when psql / pg_dump / pg_restore is executed directly against a *.supabase.co host (drift risk vs versioned migrations)
  applies_to: [Bash]
  match:
    - field: command
      # Cover the full Postgres CLI surface a developer might reach for —
      # not just psql. pg_dump / pg_restore / pg_dumpall against the live
      # Supabase host are equivalent vectors for ad-hoc reads and writes
      # that bypass the versioned migrations workflow.
      pattern: '\b(psql|pg_dump|pg_restore|pg_dumpall)\b.*\.supabase\.co'
      flags: i
  action: warn
  bypass_marker: psql-supabase-remote
  memory_ref: feedback_scripts_not_db.md
  message: |
    WARNING: direct psql / pg_dump / pg_restore execution against a Supabase
    remote host.

    SQL Editor / direct-Postgres-CLI workflows create drift between the
    versioned migrations directory and other devs' local databases.

    Correct workflow:
      1. Add a migration in supabase/migrations/<timestamp>_<slug>.sql
      2. Test locally:  supabase db reset --local
      3. Push to develop — CI applies the migration to staging automatically
      4. For production: follow the create-release SOP

    Use the bypass marker only for legitimate hotfixes where the PR cycle
    is too slow.
  tests:
    - name: warns-on-psql-supabase-remote
      input:
        tool_input:
          command: "psql postgresql://user:pass@db.example1.supabase.co:5432/postgres -c 'SELECT 1'"
      expected_exit: 0
      expected_stderr_contains: 'warn-psql-against-supabase-remote'
    - name: warns-on-psql-different-supabase-host
      input:
        tool_input:
          command: "psql -h db.example2.supabase.co -d postgres -c 'CREATE INDEX foo_idx ON foo (id)'"
      expected_exit: 0
      expected_stderr_contains: 'warn-psql-against-supabase-remote'
    - name: warns-on-pg-dump-supabase-remote
      input:
        tool_input:
          command: 'pg_dump -h db.example1.supabase.co -d postgres -t public.foo > foo.sql'
      expected_exit: 0
      expected_stderr_contains: 'warn-psql-against-supabase-remote'
    - name: warns-on-pg-restore-supabase-remote
      input:
        tool_input:
          command: 'pg_restore -h db.example1.supabase.co -d postgres backup.dump'
      expected_exit: 0
      expected_stderr_contains: 'warn-psql-against-supabase-remote'
    - name: allows-psql-localhost
      input:
        tool_input:
          command: "psql -h localhost -p 54322 -d postgres -c 'SELECT 1'"
      expected_exit: 0
    - name: allows-non-psql-supabase-references
      input:
        tool_input:
          command: 'curl https://example1.supabase.co/rest/v1/foo'
      expected_exit: 0
    - name: allows-bypass-marker
      input:
        tool_input:
          command: "psql -h db.example1.supabase.co -c 'SELECT 1' # hook-bypass: psql-supabase-remote"
      expected_exit: 0

- id: pr-create-with-migrations-needs-deploy-note
  description: Warn when gh pr create body (inline --body) does not mention migrations (caller should verify the PR has no migration files)
  applies_to: [Bash]
  match:
    - field: command
      # Require an inline --body argument and explicitly exclude --body-file
      # (which sources the body from a separate file the rule cannot read,
      # so any keyword check would produce a false positive). Matching --body
      # immediately followed by space, "=" or end-of-string anchors the
      # positive match away from --body-file's "--body-" substring.
      pattern: 'gh[[:space:]]+pr[[:space:]]+create.*--body([[:space:]]|=|$)'
      not_pattern: '--body-file'
      flags: i
    - field: command
      not_pattern: '(migration|db push|supabase db|migration-deployment|requires.*staging|requires.*prod)'
      flags: i
  action: warn
  bypass_marker: pr-create-no-migration-note
  memory_ref: feedback_scripts_not_db.md
  message: |
    WARNING: gh pr create body does not mention migrations.

    If your PR modifies files under supabase/migrations/, the body MUST
    include a "Migration deployment" section that lists:
      1. Which envs need supabase db push (staging auto via CI; prod via release)
      2. Backfill order if the migrations depend on existing data
      3. Post-merge verification steps

    This rule does NOT inspect the diff — it only reads the command, and it
    intentionally skips --body-file invocations because it cannot read the
    referenced file. Use the bypass marker if your PR has no migrations.
  tests:
    - name: warns-on-pr-create-body-without-migration-mention
      input:
        tool_input:
          command: 'gh pr create --base develop --title "feat: foo" --body "Adds feature X"'
      expected_exit: 0
      expected_stderr_contains: 'pr-create-with-migrations-needs-deploy-note'
    - name: allows-pr-create-body-mentioning-migration
      input:
        tool_input:
          command: 'gh pr create --base develop --title "feat: foo" --body "Adds X. Migration deployment: requires supabase db push on staging"'
      expected_exit: 0
    - name: allows-pr-create-body-mentioning-db-push
      input:
        tool_input:
          command: 'gh pr create --body "Use db push to apply"'
      expected_exit: 0
    - name: allows-pr-create-with-body-file
      input:
        tool_input:
          command: 'gh pr create --base develop --title "feat: foo" --body-file ./pr-body.md'
      expected_exit: 0
    - name: allows-bypass-marker
      input:
        tool_input:
          command: 'gh pr create --body "release notes only # hook-bypass: pr-create-no-migration-note"'
      expected_exit: 0

- id: block-supabase-db-push-prod
  description: Block supabase db push that targets the PRODUCTION project ref or uses --linked (the linked project may transparently be production)
  applies_to: [Bash]
  match:
    - field: command
      # Two paths into the production database, both blocked:
      #   1. An explicit --project-ref / --db-url containing __PROD_SUPABASE_REF__
      #      (substituted at build time from .private/substitutions.json; see
      #      hooks/rules/README.md). Without the substitution, the literal
      #      placeholder string remains and the rule is documented inert.
      #   2. `supabase db push --linked`, which resolves to whichever project
      #      the developer most recently ran `supabase link --project-ref ...`
      #      against. The CLI gives no static way to know whether that link
      #      points at staging or prod, so we conservatively block it and
      #      require the bypass marker as the author's explicit ack that they
      #      verified the linked project is intentional.
      pattern: 'supabase[[:space:]]+db[[:space:]]+push.*(__PROD_SUPABASE_REF__|--linked\b)'
  action: block
  bypass_marker: prod-db-push-approved
  memory_ref: feedback_never_touch_prod_without_approval.md
  message: |
    BLOCKED: supabase db push targeting either the PRODUCTION project ref
    or the currently-linked project (which may be production).

    NEVER run against production without explicit user approval — see
    feedback_never_touch_prod_without_approval.md.

    Correct workflow:
      1. Merge to main
      2. The release owner runs the create-release SOP that ships
         migrations to production through CI, not from a developer machine.

    Use the bypass marker ONLY when the user has verbally approved the
    operation. For --linked, double-check the active link first:
      supabase status --output json | jq -r '.project_ref'

    Marketplace consumers: the production project ref is configured per
    install via .private/substitutions.json (PROD_SUPABASE_REF token). See
    hooks/rules/README.md for the substitution workflow.
  tests:
    - name: blocks-supabase-db-push-prod
      input:
        tool_input:
          command: 'supabase db push --db-url postgresql://postgres:pwd@db.__PROD_SUPABASE_REF__.supabase.co:5432/postgres'
      expected_exit: 2
    - name: blocks-supabase-db-push-prod-with-project-ref-flag
      input:
        tool_input:
          command: 'supabase db push --project-ref __PROD_SUPABASE_REF__'
      expected_exit: 2
    - name: blocks-supabase-db-push-linked
      input:
        tool_input:
          command: 'supabase db push --linked'
      expected_exit: 2
    - name: blocks-supabase-db-push-linked-with-extra-flags
      input:
        tool_input:
          command: 'supabase db push --linked --include-all'
      expected_exit: 2
    - name: allows-supabase-db-push-staging
      input:
        tool_input:
          command: 'supabase db push --project-ref __STAGING_SUPABASE_REF__'
      expected_exit: 0
    - name: allows-supabase-db-push-local
      input:
        tool_input:
          command: 'supabase db push'
      expected_exit: 0
    - name: allows-bypass-marker-prod-ref
      input:
        tool_input:
          command: 'supabase db push --project-ref __PROD_SUPABASE_REF__ # hook-bypass: prod-db-push-approved'
      expected_exit: 0
    - name: allows-bypass-marker-linked
      input:
        tool_input:
          command: 'supabase db push --linked # hook-bypass: prod-db-push-approved'
      expected_exit: 0


- id: warn-curl-mutating-supabase-rest
  description: Warn when curl issues a mutating HTTP method (POST/PATCH/PUT/DELETE) against the Supabase PostgREST endpoint (drift risk vs versioned migrations + RLS bypass)
  applies_to: [Bash]
  match:
    # The pattern catches three mutation vectors against Supabase PostgREST:
    #   1. Explicit `-X METHOD` (with or without space; `-X POST` and the
    #      no-space `-XPOST` shorthand both fire).
    #   2. URL-before-flag ordering (`curl <url> -X POST ...`), which is
    #      common in shell scripts that build the URL into a variable.
    #   3. Implicit POST via `-d` / `--data` / `--data-raw` / `--data-binary`.
    #      Curl auto-promotes to POST when these flags are present even
    #      without `-X`, so a one-liner like `curl -d '...' <url>` is a
    #      live mutation that would otherwise pass silently.
    # The match is narrowed to `.supabase.co/rest/v1/` (PostgREST) so this
    # rule does NOT fire for Supabase Auth / Storage / Edge Function
    # endpoints — those have separate guidance and Edge Functions are the
    # intended outlet.
    - field: command
      pattern: 'curl.*((-X[[:space:]]*(POST|PATCH|PUT|DELETE).*\.supabase\.co/rest/v1/)|(\.supabase\.co/rest/v1/.*-X[[:space:]]*(POST|PATCH|PUT|DELETE))|((-d[[:space:]]|--data([[:space:]]|=|-raw[[:space:]]|-raw=|-binary[[:space:]]|-binary=|-urlencode[[:space:]]|-urlencode=)).*\.supabase\.co/rest/v1/)|(\.supabase\.co/rest/v1/.*(-d[[:space:]]|--data([[:space:]]|=|-raw[[:space:]]|-raw=|-binary[[:space:]]|-binary=|-urlencode[[:space:]]|-urlencode=))))'
      flags: i
  action: warn
  bypass_marker: curl-supabase-rest-mutation
  memory_ref: feedback_scripts_not_db.md
  message: |
    WARNING: mutating curl against the Supabase PostgREST endpoint.

    Direct REST mutations bypass:
      - the versioned migrations workflow (drift across local DBs / envs),
      - the RLS + admin-role checks the Supabase clients enforce, and
      - the access pattern already encapsulated in src/services/api/.

    Correct outlets:
      - Schema changes      -> supabase/migrations/<timestamp>_<slug>.sql
      - Data mutations      -> an Edge Function or a committed script
      - One-shot fixes      -> use the API client from a versioned script

    Use the bypass marker (curl-supabase-rest-mutation) only for documented
    hotfixes that the team has explicitly approved.
  tests:
    - name: warns-curl-post-supabase-rest
      input:
        tool_input:
          command: "curl -X POST https://example.supabase.co/rest/v1/profiles -H 'apikey: x' -d '{\"id\":1}'"
      expected_exit: 0
      expected_stderr_contains: 'warn-curl-mutating-supabase-rest'
    - name: warns-curl-patch
      input:
        tool_input:
          command: "curl -X PATCH https://example.supabase.co/rest/v1/profiles?id=eq.1 -d '{\"name\":\"a\"}'"
      expected_exit: 0
      expected_stderr_contains: 'warn-curl-mutating-supabase-rest'
    - name: warns-curl-put
      input:
        tool_input:
          command: "curl -X PUT https://example.supabase.co/rest/v1/profiles?id=eq.1 -d '{\"name\":\"b\"}'"
      expected_exit: 0
      expected_stderr_contains: 'warn-curl-mutating-supabase-rest'
    - name: warns-curl-delete
      input:
        tool_input:
          command: 'curl -X DELETE https://example.supabase.co/rest/v1/profiles?id=eq.1'
      expected_exit: 0
      expected_stderr_contains: 'warn-curl-mutating-supabase-rest'
    - name: warns-curl-xpost-no-space
      input:
        tool_input:
          command: "curl -XPOST https://example.supabase.co/rest/v1/profiles -d '{\"id\":1}'"
      expected_exit: 0
      expected_stderr_contains: 'warn-curl-mutating-supabase-rest'
    - name: warns-curl-url-before-flag
      input:
        tool_input:
          command: "curl https://example.supabase.co/rest/v1/profiles -X POST -d '{\"id\":1}'"
      expected_exit: 0
      expected_stderr_contains: 'warn-curl-mutating-supabase-rest'
    - name: allows-curl-get-supabase-rest
      input:
        tool_input:
          command: 'curl https://example.supabase.co/rest/v1/profiles?select=id,name'
      expected_exit: 0
    - name: allows-curl-non-supabase
      input:
        tool_input:
          command: "curl -X POST https://example.com/api/v1/users -d '{\"id\":1}'"
      expected_exit: 0
    - name: warns-curl-implicit-post-via-d
      input:
        tool_input:
          command: "curl -d '{\"id\":1}' https://example.supabase.co/rest/v1/profiles"
      expected_exit: 0
      expected_stderr_contains: 'warn-curl-mutating-supabase-rest'
    - name: warns-curl-implicit-post-via-data-raw
      input:
        tool_input:
          command: "curl --data-raw '{\"id\":1}' https://example.supabase.co/rest/v1/profiles"
      expected_exit: 0
      expected_stderr_contains: 'warn-curl-mutating-supabase-rest'
    - name: warns-curl-supabase-then-d
      input:
        tool_input:
          command: "curl https://example.supabase.co/rest/v1/profiles -d '{\"id\":1}'"
      expected_exit: 0
      expected_stderr_contains: 'warn-curl-mutating-supabase-rest'
    - name: warns-curl-implicit-post-via-data-urlencode
      input:
        tool_input:
          command: "curl --data-urlencode 'name=Alice' https://example.supabase.co/rest/v1/profiles"
      expected_exit: 0
      expected_stderr_contains: 'warn-curl-mutating-supabase-rest'
    - name: allows-bypass-marker
      input:
        tool_input:
          command: "curl -X POST https://example.supabase.co/rest/v1/profiles -d '{\"id\":1}' # hook-bypass: curl-supabase-rest-mutation"
      expected_exit: 0

# -----------------------------------------------------------------------------
# Anti foot-shoot (Tier 1) — block rules for the high-cost mistakes that
# already burned the team. Each rule maps 1:1 to a feedback memory whose
# intent is "never do this", not "be careful":
#   - feedback_no_headless.md            -> block-playwright-headless
#   - feedback_resolve_merge_conflicts.md -> block-git-force-push-no-lease,
#                                            block-git-rebase-skip
#   - feedback_standup_desktop.md        -> block-standup-not-in-escritorio
#   - feedback_goodnight_desktop.md      -> block-goodnight-not-in-escritorio
#
# All five are `block` (not `warn`). Each ships a kebab-case bypass_marker
# for the rare cases where the action is intentional (and ideally
# documented in a commit message or PR body).
# -----------------------------------------------------------------------------

- id: block-playwright-headless
  description: Block `playwright test` invocations that omit --headed / --ui / --debug (memory feedback_no_headless.md — browser must be visible during E2E)
  applies_to: [Bash]
  match:
    # Two AND-chained conditions on `command`. The first asserts the
    # invocation is a playwright test run; the second asserts none of the
    # opt-in visible-runner flags are present. `\b` boundaries on
    # `playwright` exclude unrelated tools like playwright-extra-cli.
    - field: command
      pattern: '\bplaywright[[:space:]]+test\b'
    - field: command
      not_pattern: '(--headed|--ui|--debug)'
  action: block
  bypass_marker: playwright-headless-allowed
  memory_ref: feedback_no_headless.md
  message: |
    BLOCKED: `playwright test` without --headed / --ui / --debug.

    Per feedback_no_headless.md the browser must be visible during E2E:
    headless runs hide visual regressions and UI race conditions, and
    the in-focus requirement only holds when a window is up.

    Use one of:
      - --headed   browser visible
      - --ui       Playwright UI mode (interactive)
      - --debug    step-through debugger

    Bypass marker (playwright-headless-allowed) is reserved for
    explicitly-documented CI runs (e.g. a Vercel preview workflow).
  tests:
    - name: blocks-playwright-test-bare
      input:
        tool_input:
          command: 'npx playwright test'
      expected_exit: 2
    - name: blocks-playwright-test-config
      input:
        tool_input:
          command: 'npx playwright test --config=playwright.config.ts'
      expected_exit: 2
    - name: allows-playwright-headed
      input:
        tool_input:
          command: 'npx playwright test --headed'
      expected_exit: 0
    - name: allows-playwright-ui
      input:
        tool_input:
          command: 'npx playwright test --ui'
      expected_exit: 0
    - name: allows-playwright-debug
      input:
        tool_input:
          command: 'npx playwright test --debug'
      expected_exit: 0
    - name: allows-non-playwright-test
      input:
        tool_input:
          command: 'npm test'
      expected_exit: 0
    - name: blocks-pnpm-dlx-playwright-headless
      input:
        tool_input:
          command: 'pnpm dlx playwright test'
      expected_exit: 2
    - name: blocks-yarn-dlx-playwright-headless
      input:
        tool_input:
          command: 'yarn dlx playwright test'
      expected_exit: 2
    - name: allows-pnpm-dlx-playwright-headed
      input:
        tool_input:
          command: 'pnpm dlx playwright test --headed'
      expected_exit: 0
    - name: allows-bypass-marker
      input:
        tool_input:
          command: 'npx playwright test # hook-bypass: playwright-headless-allowed'
      expected_exit: 0

- id: block-git-force-push-no-lease
  description: Block `git push --force` / `-f` without `--force-with-lease` (overwrites collaborator pushes silently)
  applies_to: [Bash]
  match:
    # Positive: a push command using -f or --force (the latter must be
    # followed by whitespace or end-of-string so we don't accidentally
    # match --force-with-lease, which has a `-` after `--force`).
    - field: command
      pattern: 'git[[:space:]]+push.*(-f\b|--force([[:space:]]|$))'
    # Negative: defense-in-depth — even if the author squeezed both flags
    # onto the line (`git push -f origin main --force-with-lease`),
    # presence of --force-with-lease aborts the fire.
    - field: command
      not_pattern: '--force-with-lease'
  action: block
  bypass_marker: git-force-push-bare-allowed
  memory_ref: feedback_resolve_merge_conflicts.md
  message: |
    BLOCKED: `git push --force` without --force-with-lease.

    Bare --force overwrites the remote without verifying that what is
    there is what you last fetched — it silently destroys collaborator
    pushes. --force-with-lease aborts when the remote has advanced since
    your last fetch, which is the safety net you want.

    Use:
      git push --force-with-lease origin <branch>

    Bypass marker (git-force-push-bare-allowed) ONLY when you have
    verified that no other contributor has pushed to the branch.
  tests:
    - name: blocks-force-short-flag
      input:
        tool_input:
          command: 'git push -f origin feature-x'
      expected_exit: 2
    - name: blocks-force-long-flag
      input:
        tool_input:
          command: 'git push --force origin feature-x'
      expected_exit: 2
    - name: allows-force-with-lease
      input:
        tool_input:
          command: 'git push --force-with-lease origin feature-x'
      expected_exit: 0
    - name: allows-no-force-push
      input:
        tool_input:
          command: 'git push origin feature-x'
      expected_exit: 0
    - name: allows-force-with-lease-and-force-combined
      input:
        tool_input:
          command: 'git push -f origin main --force-with-lease'
      expected_exit: 0
    - name: allows-bypass-marker
      input:
        tool_input:
          command: 'git push --force origin feature-x # hook-bypass: git-force-push-bare-allowed'
      expected_exit: 0

- id: block-git-rebase-skip
  description: Block `git rebase --skip` (drops the conflicting commit silently)
  applies_to: [Bash]
  match:
    - field: command
      pattern: 'git[[:space:]]+rebase[[:space:]]+--skip\b'
  action: block
  bypass_marker: git-rebase-skip-acknowledged
  memory_ref: feedback_resolve_merge_conflicts.md
  message: |
    BLOCKED: `git rebase --skip` drops the conflicting commit silently.

    Per feedback_resolve_merge_conflicts.md: never skip; resolve each
    conflict one by one, verify the result, and `git rebase --continue`.

    Correct moves:
      - Resolve manually, `git add`, `git rebase --continue`
      - If the commit is genuinely obsolete, `git rebase --abort` and
        cherry-pick the commits you want
      - Bypass marker (git-rebase-skip-acknowledged) ONLY with explicit
        acknowledgement of the data loss
  tests:
    - name: blocks-rebase-skip
      input:
        tool_input:
          command: 'git rebase --skip'
      expected_exit: 2
    - name: allows-rebase-continue
      input:
        tool_input:
          command: 'git rebase --continue'
      expected_exit: 0
    - name: allows-rebase-abort
      input:
        tool_input:
          command: 'git rebase --abort'
      expected_exit: 0
    - name: allows-non-rebase-command
      input:
        tool_input:
          command: 'git status'
      expected_exit: 0
    - name: allows-bypass-marker
      input:
        tool_input:
          command: 'git rebase --skip # hook-bypass: git-rebase-skip-acknowledged'
      expected_exit: 0

- id: block-standup-not-in-escritorio
  description: Block `daily-standup*.md` writes anywhere outside ~/Escritorio (memory feedback_standup_desktop.md)
  applies_to: [Edit, Write, MultiEdit]
  match:
    # Single condition with both pattern (must match standup filename) and
    # not_pattern (must NOT live under /Escritorio/ or /Desktop/). The
    # localized "Escritorio" handles the user's Spanish-locale desktop;
    # "Desktop" handles English-locale or aliasing setups.
    - field: file_path
      pattern: 'daily-standup.*\.md$'
      not_pattern: '(/Escritorio/|/Desktop/)'
  action: block
  bypass_marker: standup-non-desktop-acknowledged
  memory_ref: feedback_standup_desktop.md
  message: |
    BLOCKED: daily-standup file being written outside ~/Escritorio.

    Per feedback_standup_desktop.md the standup lives in ~/Escritorio,
    NEVER inside a repo (commit-by-accident risk + cross-repo
    fragmentation). The standup-post-slack skill always resolves the
    path from ~/Escritorio.

    Use the absolute path:
      ~/Escritorio/daily-standup.md
    (or ~/Desktop/daily-standup.md on English-locale machines).

    Bypass marker is intentionally NOT recommended — there is no
    legitimate path outside the desktop.
  tests:
    - name: blocks-standup-in-repo
      input:
        tool_input:
          file_path: '/home/user/repo/docs/daily-standup.md'
          content: '# Standup 2026-05-09'
      expected_exit: 2
    - name: blocks-standup-in-tmp
      input:
        tool_input:
          file_path: '/tmp/daily-standup.md'
          content: '# Standup'
      expected_exit: 2
    - name: allows-standup-in-escritorio
      input:
        tool_input:
          file_path: '/home/user/Escritorio/daily-standup.md'
          content: '# Standup'
      expected_exit: 0
    - name: allows-standup-in-desktop-english
      input:
        tool_input:
          file_path: '/home/user/Desktop/daily-standup.md'
          content: '# Standup'
      expected_exit: 0
    - name: allows-non-standup-file
      input:
        tool_input:
          file_path: '/home/user/repo/docs/notes.md'
          content: '# Notes'
      expected_exit: 0
    - name: allows-bypass-marker-write-tool
      input:
        tool_input:
          file_path: '/tmp/daily-standup.md'
          content: '# Standup // hook-bypass: standup-non-desktop-acknowledged'
      expected_exit: 0
    # Edit and MultiEdit expose `new_string` / `old_string` / `edits[]` instead
    # of `content`, so we lock in that the bypass marker placed in any of those
    # fields still short-circuits the rule. The dispatcher scans the entire raw
    # tool_input JSON for the marker, so any string-valued field is reachable.
    - name: allows-bypass-marker-edit-tool
      input:
        tool_input:
          file_path: '/tmp/daily-standup.md'
          old_string: '# Old'
          new_string: '# Standup // hook-bypass: standup-non-desktop-acknowledged'
      expected_exit: 0
    - name: allows-bypass-marker-multiedit-tool
      input:
        tool_input:
          file_path: '/tmp/daily-standup.md'
          edits:
            - old_string: '# A'
              new_string: '# B // hook-bypass: standup-non-desktop-acknowledged'
      expected_exit: 0

