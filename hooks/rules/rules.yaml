      expected_exit: 0

- id: block-git-rebase-skip
  description: Block `git rebase --skip` (drops the conflicting commit silently)
  applies_to: [Bash]
  match:
    - field: command
      pattern: 'git[[:space:]]+rebase[[:space:]]+--skip\b'
  action: block
  bypass_marker: git-rebase-skip-acknowledged
  memory_ref: feedback_resolve_merge_conflicts.md
  message: |
    BLOCKED: `git rebase --skip` drops the conflicting commit silently.

    Per feedback_resolve_merge_conflicts.md: never skip; resolve each
    conflict one by one, verify the result, and `git rebase --continue`.

    Correct moves:
      - Resolve manually, `git add`, `git rebase --continue`
      - If the commit is genuinely obsolete, `git rebase --abort` and
        cherry-pick the commits you want
      - Bypass marker (git-rebase-skip-acknowledged) ONLY with explicit
        acknowledgement of the data loss
  tests:
    - name: blocks-rebase-skip
      input:
        tool_input:
          command: 'git rebase --skip'
      expected_exit: 2
    - name: allows-rebase-continue
      input:
        tool_input:
          command: 'git rebase --continue'
      expected_exit: 0
    - name: allows-rebase-abort
      input:
        tool_input:
          command: 'git rebase --abort'
      expected_exit: 0
    - name: allows-non-rebase-command
      input:
        tool_input:
          command: 'git status'
      expected_exit: 0
    - name: allows-bypass-marker
      input:
        tool_input:
          command: 'git rebase --skip # hook-bypass: git-rebase-skip-acknowledged'
      expected_exit: 0

- id: block-standup-not-in-escritorio
  description: Block `daily-standup*.md` writes anywhere outside ~/Escritorio (memory feedback_standup_desktop.md)
  applies_to: [Edit, Write, MultiEdit]
  match:
    # Single condition with both pattern (must match standup filename) and
    # not_pattern (must NOT live under /Escritorio/ or /Desktop/). The
    # localized "Escritorio" handles the user's Spanish-locale desktop;
    # "Desktop" handles English-locale or aliasing setups.
    - field: file_path
      pattern: 'daily-standup.*\.md$'
      not_pattern: '(/Escritorio/|/Desktop/)'
  action: block
  bypass_marker: standup-non-desktop-acknowledged
  memory_ref: feedback_standup_desktop.md
  message: |
    BLOCKED: daily-standup file being written outside ~/Escritorio.

    Per feedback_standup_desktop.md the standup lives in ~/Escritorio,
    NEVER inside a repo (commit-by-accident risk + cross-repo
    fragmentation). The standup-post-slack skill always resolves the
    path from ~/Escritorio.

    Use the absolute path:
      ~/Escritorio/daily-standup.md
    (or ~/Desktop/daily-standup.md on English-locale machines).

    Bypass marker is intentionally NOT recommended — there is no
    legitimate path outside the desktop.
  tests:
    - name: blocks-standup-in-repo
      input:
        tool_input:
          file_path: '/home/user/repo/docs/daily-standup.md'
          content: '# Standup 2026-05-09'
      expected_exit: 2
    - name: blocks-standup-in-tmp
      input:
        tool_input:
          file_path: '/tmp/daily-standup.md'
          content: '# Standup'
      expected_exit: 2
    - name: allows-standup-in-escritorio
      input:
        tool_input:
          file_path: '/home/user/Escritorio/daily-standup.md'
          content: '# Standup'
      expected_exit: 0
    - name: allows-standup-in-desktop-english
      input:
        tool_input:
          file_path: '/home/user/Desktop/daily-standup.md'
          content: '# Standup'
      expected_exit: 0
    - name: allows-non-standup-file
      input:
        tool_input:
          file_path: '/home/user/repo/docs/notes.md'
          content: '# Notes'
      expected_exit: 0
    - name: allows-bypass-marker-write-tool
      input:
        tool_input:
          file_path: '/tmp/daily-standup.md'
          content: '# Standup // hook-bypass: standup-non-desktop-acknowledged'
      expected_exit: 0
    # Edit and MultiEdit expose `new_string` / `old_string` / `edits[]` instead
    # of `content`, so we lock in that the bypass marker placed in any of those
    # fields still short-circuits the rule. The dispatcher scans the entire raw
    # tool_input JSON for the marker, so any string-valued field is reachable.
    - name: allows-bypass-marker-edit-tool
      input:
        tool_input:
          file_path: '/tmp/daily-standup.md'
          old_string: '# Old'
          new_string: '# Standup // hook-bypass: standup-non-desktop-acknowledged'
      expected_exit: 0
    - name: allows-bypass-marker-multiedit-tool
      input:
        tool_input:
          file_path: '/tmp/daily-standup.md'
          edits:
            - old_string: '# A'
              new_string: '# B // hook-bypass: standup-non-desktop-acknowledged'
      expected_exit: 0

